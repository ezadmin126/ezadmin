<script>
    layui.use(function(){
            var form=layui.form;
            var $=layui.jquery;
            form.on('select(col)',function(data){
                var active=$(".active");
                var col=active.attr("d-col")||12;
                active.removeClass("layui-col-md"+col)
                active.addClass("layui-col-md"+data.value);
                active.attr("d-col",data.value);
            });

            $(".config-form").find("input,textarea").on("change",function(){
                    var name=$(this).attr("name");
                    var active=$(".active");
                    active.attr("d-"+name,$(this).val());
                    if(name=='label'){
                        active.find('.layui-form-label').text($(this).val())
                    }
                    if(name=='placeholder'){
                        active.find('input').attr("placeholder",$(this).val())
                    }
                    if(name=='top_desc'){
                        active.find(".top_desc").remove();
                        if($(this).val()!='') {
                            active.find(".layui-input-block").prepend("<div class=\"layui-form-mid layui-text-em top_desc\">" + $(this).val() + "</div>");
                        }
                    }
                    if(name=='item_desc'){
                          active.find(".item_desc").remove();
                          if($(this).val()!=''){
                              active.find(".layui-input-block").append("<div class=\"layui-form-mid layui-text-em item_desc\">"+$(this).val()+"</div>");
                          }
                    }
                    if(name=='groupname'){
                          active.find(".layui-card-header").text($(this).val());
                    }
            })




    });
    $(function (){

        dragula({
            isContainer: function (el) {
                return $(el).hasClass('dragula-container'); // only elements in drake.containers will be taken into account
            },
            moves: function (el, source, handle, sibling) {
                return true; // elements are always draggable by default
            },
            accepts: function (el, target, source, sibling) {
                 return true; // elements can be dropped in any of the `containers` by default
            },
            invalid: function (el, handle) {
                return false; // don't prevent any drags from initiating by default
            },
            copy: true,
            revertOnSpill: true,
             copySortSource: true
        }).on('drop', function (el, target, source, sibling) {

            if( $(el).find(".template").length>0){
                var tmp=$(el).find(".template");
                    tmp.find('[name=default]').attr("name",Date.now());

                $(el).replaceWith($(el).find(".template").html());
            }else{
                return false;
            }
            layui.form.render()
            //return $(el).find(".template").html();
        })

        let tools=`<div class="layui-component-tools">
<i class="layui-icon layui-icon-templeate-1" title="复制"></i>
<i class="layui-icon layui-icon-delete" title="删除"></i>
</div>`;
        function rowselect(el){
            $(".active").removeClass("active");
            $(".layui-component-tools").remove();
            el.addClass("active");
            el.append(tools);
            $(".config-form").hide();
            var currentConfig=$(".config-"+el.attr("type"));
            $.each(el[0].attributes,function(i,d){
                if(d.name.indexOf('d-')>=0){
                    var cname=d.name.replace('d-','');
                    try{
                        currentConfig.find("[name="+cname+"]").val(d.value);
                    }catch(e){
                        console.log(e);
                    }
                }
            })
            switch (el.attr("type")){
                case 'input-text':
                    console.log('input-text');
                    break;
                case 'card':
                    console.log('card');
                    break;
                default:
                    break;
            }
            layui.form.render();
            currentConfig.show();
        }

        $(document).on("click",".selector",function(e){
            // console.log($(this)[0].classList)
              if(!$(this).hasClass("active")){
                  rowselect($(this));
              }
            e.preventDefault();
            e.stopPropagation();
        })

        $(document).on("click",".layui-icon-delete",function(e){
            $(this).parents(".active").remove();
        })
        $(document).on("click",".layui-icon-templeate-1",function(e){
            e.preventDefault();
            e.stopPropagation();
            var copy=$(this).parents(".active").clone();
            $(this).parents(".active").parent().append(copy);
            $(".active").removeClass("active");
            $(".layui-component-tools").remove();
        })

        layer.open({
            type: 1,
            offset: 'l',
            anim: 5, // 从左往右
            area: ['17.666667%', '100%'],
            shade: 0,
            closeBtn:0,
            title:'',
            content:$(".lefttab"),
            success: function(){

            },end: function(){
            }
        });
        layer.open({
                    type: 1,
                    offset: 'r',
                    anim: 5, // 从左往右
                    area: ['17.666667%', '100%'],
                    shade: 0,
                    closeBtn:1,
                    title:'配置',
                    maxmin: true,
                    resize:true,
                    content:$(".righttab"),
                    success: function(){

                    },end: function(){
                    }
                });
    })


</script>
