<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>输入-颜色选择器</title>
</head>
<body id="colorpick">
<input type="hidden" th:value="${value}" placeholder="请选择颜色"
       th:name="${name}"
       th:item_name="${item_name}">
<div class="colorpick" th:target="${item_name}" th:lay-options="'{color: \''+${value}+'\'}'"></div>
</body>
</html>
