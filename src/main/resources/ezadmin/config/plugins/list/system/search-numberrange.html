<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>搜索-数字范围</title>
</head>
<body id="numberrange"  >
<div   th:ITEM_NAME="${model.getConfig('item_name')}" th:style="${model.getConfig('style')}"
     th:ITEM_ID="${model.getConfig('item_name')}">
    <label class="layui-form-label" th:for="${'itemId-' + model.getConfig('item_name')}"
           th:text="${model.getConfig('label')}" th:title="${model.getConfig('label')}">Date range:</label>

    <div class="layui-input-inline ez-range  " style="margin-right: 0">
        <input autocomplete="off" type="text" class="layui-input  "
               th:value="${model.getParam(model.getConfig('item_name')+'_START')}"
               th:name="${model.getConfig('item_name')+'_START'}" th:id="${model.getConfig('item_name')+'_START_ID'}">
    </div>
    <div class="layui-form-mid">-</div>
    <div class="layui-input-inline ez-range " style="margin-right: 0">
        <input autocomplete="off" type="text" class="layui-input "
               th:value="${model.getParam(model.getConfig('item_name')+'_END')}"
               th:name="${model.getConfig('item_name')+'_END'}" th:id="${model.getConfig('item_name')+'_END_ID'}">
    </div>

</div>
 </body>
</html>
