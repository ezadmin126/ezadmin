<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>日期区间</title>
</head>
<body id="daterange" alias="17" type="search" icon="layui-icon-date">

<div id="template" >
    <div class="layui-col-md3 layui-col-space10 selector" type="input-daterange">
        <div class="layui-form-item ">
            <label class="layui-form-label  ">日期区间</label>
            <div class="ez-daterange-parent  ">

                    <div class="layui-input-inline ez-range ez-daterange" style="margin-right: 0;width:30px!important">
                        <div class="layui-input-wrap">
                            <div class="layui-input-prefix">
                                <i class="layui-icon layui-icon-date"></i>
                            </div>
                            <input  PLACEHOLDER="开始时间"  autocomplete="off" type="text"
                                     class="layui-input layui-date"
                                     name="default" >
                        </div>
                    </div>
                    <div class="layui-form-mid">-</div>
                    <div class="layui-input-inline ez-range ez-daterange" style="margin-right: 0;width:30px!important">

                        <div class="layui-input-wrap">
                            <div class="layui-input-prefix">
                                <i class="layui-icon layui-icon-date"></i>
                            </div>

                        </div>
                    </div>

            </div>
        </div>
    </div>
</div>


<div id="content">


     <div class="selector layui-col-md3 list-item " type="input-daterange"
              th:style="${model.style}"
              th:ITEM_NAME="${model.item_name}"
              th:ez-name="${model.item_name}"
              th:classappend="${(model.plugin=='hidden'||model.plugin=='input-hidden')?'list-item-hidden':''}"
     >
         <div  class="layui-form-item" >

                <label class="layui-form-label" th:for="${'search-itemName-' + model.item_name}"
                       th:text="${model.label}" th:title="${model.label}">Date range:</label>
                <div class="ez-daterange-parent  ">
                    <div class="layui-input-inline ez-range ez-daterange" style="margin-right: 0">
                        <input PLACEHOLDER="开始时间" autocomplete="off" type="text" class="layui-input layui-date"
                               th:value="${model.itemParamValueStart}"
                               th:name="${model.item_name+'_START'}"
                               th:id="${model.item_name+'_START_ID'}">
                    </div>
                    <div class="layui-form-mid">-</div>
                    <div class="layui-input-inline ez-range ez-daterange" style="margin-right: 0">
                        <input PLACEHOLDER="结束时间" autocomplete="off" type="text" class="layui-input layui-date"
                               th:value="${model.itemParamValueEnd}"
                               th:name="${model.item_name+'_END'}" th:id="${model.item_name+'_END_ID'}">
                    </div>
                </div>

         </div>
    </div>


</div>
 </body>
</html>
