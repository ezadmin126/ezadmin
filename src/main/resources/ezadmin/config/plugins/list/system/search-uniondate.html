<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>合并时间搜索</title>
</head>
<body id="uniondate" alias="search-date" type="search" icon="layui-icon-more">

<div id="template" >
    <div class="layui-col-space10 selector layui-col-md3" type="uniondate">
        <div class="layui-form-item ">
            <div class="layui-input-inline edit-unionsearch " style="width:100px;padding:0px">

            <select name="default" class=""><option value="">请选择</option></select>
            </div>

                <div class="ez-daterange-parent  ">
                    <div class="layui-input-inline ez-range ez-daterange" style="margin-right: 0;width:30px!important">
                        <div class="layui-input-wrap">
                            <div class="layui-input-prefix">
                                <i class="layui-icon layui-icon-date"></i>
                            </div>
                            <input  PLACEHOLDER="开始时间"  autocomplete="off" type="text"
                                    class="layui-input layui-date"
                                    name="default" >
                        </div>
                    </div>
                    <div class="layui-form-mid">-</div>
                    <div class="layui-input-inline ez-range ez-daterange" style="margin-right: 0;width:30px!important">

                        <div class="layui-input-wrap">
                            <div class="layui-input-prefix">
                                <i class="layui-icon layui-icon-date"></i>
                            </div>

                        </div>
                    </div>

                </div>

        </div>
    </div>


</div>
<div id="content">
    <div class=" layui-col-md3 list-item selector" type="uniondate"
     th:style="${model.style}"
     th:ITEM_NAME="${model.item_name}"
     th:ez-name="${model.item_name}"
     th:classappend="${(model.plugin=='hidden'||model.plugin=='input-hidden')?'list-item-hidden':''}"
>
        <div  class="layui-form-item" >
    <div class="layui-input-inline edit-unionsearch " style="width:100px;padding:0px"
         th:for="${'ITEM_ID_' + model.item_name}">
        <select th:id="${'ITEM_ID_' + model.item_name}" style="width: 100%;" name="itemSearchDateKey">
            <option th:selected="${model.itemSearchDateKey==null?false:#strings.equals(model.itemSearchDateKey,item.item_name)}"
                    th:value="${item.item_name}" th:text="${item.label}"
                    th:each="item:${itemNameList}">Alaska
            </option>
        </select>
    </div>

    <div class="ez-daterange-parent  " TH:ID="${'ITEM_ID_' + model.item_name}">
        <div class="layui-input-inline ez-range ez-daterange" style="margin-right: 0">
            <input autocomplete="off" type="text" class="layui-input layui-date"
                   th:value="${model.itemSearchDateValueStart}" name="itemSearchDateValueStart"
                   id="itemSearchDateValueStart_ID"
                    >
        </div>
        <div class="layui-form-mid">-</div>
        <div class="layui-input-inline ez-range ez-daterange">
            <input autocomplete="off" type="text" class="layui-input layui-date"
                   th:value="${model.itemSearchDateValueEnd}" name="itemSearchDateValueEnd"
                   id="itemSearchDateValueEnd_ID"
                   >
        </div>
    </div>

    </div>

    </div>
</div>
</body>
</html>
