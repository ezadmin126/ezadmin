<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>搜索-多选下拉</title>
</head>
<body id="xmselect" alias="xm-select" type="search">
<div class=" layui-col-md3 list-item "
     th:style="${model.getConfig('style')}"
     th:ITEM_NAME="${model.getConfig('item_name')}"
     th:ez-name="${model.getConfig('item_name')}"
     th:classappend="${(model.getConfig('plugin')=='hidden'||model.getConfig('plugin')=='input-hidden')?'list-item-hidden':''}"
>
    <div  class="layui-form-item" >

        <label class="layui-form-label" th:for="${'itemName-' + model.getConfig('item_name')}"
               th:text="${model.getConfig('label')}" th:title="${model.getConfig('label')}">普通文本</label>
        <div th:class="${#strings.isEmpty(model.getParam(model.getConfig('item_name')))?'layui-input-block':'layui-input-block layui-border-blue' } ">
            <div th:itemPlaceholder="${model.getConfig('placeholder')}" th:itemsJson="${itemsJson}" class="ez-xmselect"
                 th:id="${'itemName-' + model.getConfig('item_name')}" th:name="${model.getConfig('item_name')}"
                 th:value="${#strings.isEmpty(model.getParam(model.getConfig('item_name')))?'[]':'['+model.getParam(model.getConfig('item_name'))+']'}"></div>
        </div>
    </div>
</div>


</body>
</html>
