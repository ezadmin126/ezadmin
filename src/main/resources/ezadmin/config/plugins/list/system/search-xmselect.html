<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>多选下拉框</title>
</head>
<body id="xmselect" alias="xm-select" type="search" icon="layui-icon-more">

<div id="template" >
    <div class="layui-col-space10 selector layui-col-md3" type="xmselect">
        <div class="layui-form-item ">
            <label class="layui-form-label  ">多选下拉框</label>
            <div class="layui-input-block">
                <select name="default" class=""><option value="">请选择</option></select>
            </div>
        </div>
    </div>
</div>
<div id="content">
<div class=" layui-col-md3 list-item  selector" type="xmselect"
     th:style="${model.style}"
     th:ITEM_NAME="${model.item_name}"
     th:ez-name="${model.item_name}"
     th:classappend="${(model.plugin=='hidden'||model.plugin=='input-hidden')?'list-item-hidden':''}"
>
    <div  class="layui-form-item" >

        <label class="layui-form-label" th:for="${'itemName-' + model.item_name}"
               th:text="${model.label}" th:title="${model.label}">普通文本</label>
        <div  class="layui-input-block">
            <div th:itemPlaceholder="${model.placeholder}" th:itemsJson="${itemsJson}" class="ez-xmselect"
                 th:id="${'itemName-' + model.item_name}" th:name="${model.item_name}"
                 th:value="${#strings.isEmpty(model.itemParamValue)?'[]':'['+model.itemParamValue+']'}"></div>
        </div>
    </div>
</div>

</div>
</body>
</html>
