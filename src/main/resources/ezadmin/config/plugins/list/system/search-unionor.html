<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>多字段分别or搜索</title>
</head>
<body id="unionor" type="search" icon="layui-icon-more">

<div id="template" >
    <div class="layui-col-space10 selector layui-col-md3" type="unionor">
        <div class="layui-form-item ">
            <div class="layui-input-inline edit-unionsearch " style="width:100px;padding:0px">

                <select name="default" class=""><option value="">请选择</option></select>
            </div>
            <div class="layui-input-block">
                <input type="text" name="default" placeholder="请输入" class="layui-input">
            </div>
        </div>
    </div>


</div>
<div id="content">
    <div class=" layui-col-md3 list-item selector" type="unionor"
     th:style="${model.style}"
     th:ITEM_NAME="${model.item_name}"
     th:ez-name="${model.item_name}"
     th:classappend="${(model.plugin=='hidden'||model.plugin=='input-hidden')?'list-item-hidden':''}"
>
    <div  class="layui-form-item" >
        <div class="layui-input-inline edit-unionsearch " style="width:100px"
             th:for="${'itemId-' + model.item_name}">
            <select style="width: 100%;" name="itemSearchKey">
                <option value="">关键字</option>
                <option th:selected="${model.itemSearchKey==null?false:#strings.equals(model.itemSearchKey,item.item_name)}"
                        th:value="${item.item_name}" th:text="${item.label}"
                        th:each="item:${itemNameList}">Alaska
                </option>
            </select>
        </div>
        <div  class="layui-input-block">
        <input th:id="${'itemId-' + model.item_name}" type="text"
               th:placeholder="${model.placeholder}"
               th:title="${model.title}"
        class="layui-input" th:value="${model.itemSearchValue}" name="itemSearchValue"
        th:aria-describedby="${'DESC_'+model.item_name}" >
    </div>
    </div>
</div>
</div>
</body>
</html>
