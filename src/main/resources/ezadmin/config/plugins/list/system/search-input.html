<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>单行输入框</title>
</head>
<body id="input-text" alias="19" alias2="input" type="search" icon="layui-icon-file">
<div id="template">
    <div class="layui-col-space10 selector layui-col-md3"   type="input-text">
        <div class="layui-form-item ">
            <label class="layui-form-label  ">单行输入框</label>
            <div class="layui-input-block">
                <input type="text" name="default" placeholder="请输入" class="layui-input">
            </div>
        </div>
    </div>
</div>
<div id="content">

<div class="selector layui-col-md3 list-item " type="input-text"
     th:style="${model.getConfig('style')}"
     th:ITEM_NAME="${model.getConfig('item_name')}"
     th:ez-name="${model.getConfig('item_name')}"
     th:classappend="${(model.getConfig('plugin')=='hidden'||model.getConfig('plugin')=='input-hidden')?'list-item-hidden':''}"
      >
    <div  class="layui-form-item" >
        <label class="layui-form-label" th:for="${'search-itemName-' + model.getConfig('item_name')}"
               th:text="${model.getConfig('label')}" th:title="${model.getConfig('label')}">普通文本</label>
        <div class="layui-input-block">
            <div class="layui-input-wrap">
            <input th:placeholder="${model.getConfig('placeholder')}"
                   type="text" lay-affix="clear"
                   th:class="${#strings.isEmpty(model.getParam(model.getConfig('item_name')))?'layui-input':'layui-input layui-border-blue' } "
                   th:value="${model.getParam(model.getConfig('item_name'))}" th:name="${model.getConfig('item_name')}"
                   th:id="${'search-itemName-' + model.getConfig('item_name')}">
            </div>
        </div>

    </div>
</div>

</div>
</body>
</html>
