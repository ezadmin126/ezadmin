<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>搜索-输入框</title>
</head>
<body id="input-text" alias="19" alias2="input" type="search">

<div class=" layui-col-md3 list-item "
     th:style="${model.getConfig('style')}"
     th:ITEM_NAME="${model.getConfig('item_name')}"
     th:ez-name="${model.getConfig('item_name')}"
     th:classappend="${(model.getConfig('plugin')=='hidden'||model.getConfig('plugin')=='input-hidden')?'list-item-hidden':''}"
      >
    <div  class="layui-form-item" >
        <label class="layui-form-label" th:for="${'search-itemName-' + model.getConfig('item_name')}"
               th:text="${model.getConfig('label')}" th:title="${label}">普通文本</label>
        <div class="layui-input-block">
            <input th:placeholder="${model.getConfig('placeholder')}"
                   type="text"
                   th:class="${#strings.isEmpty(model.getParam(model.getConfig('item_name')))?'layui-input':'layui-input layui-border-blue' } "
                   th:value="${model.getParam(model.getConfig('item_name'))}" th:name="${model.getConfig('item_name')}"
                   th:id="${'search-itemName-' + model.getConfig('item_name')}">
        </div>

    </div>
</div>

</body>
</html>
