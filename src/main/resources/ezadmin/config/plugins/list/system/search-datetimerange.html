<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>日期时间区间</title>
</head>
<body id="datetimerange" type="search" icon="layui-icon-date">


<div id="template" >
    <div class="layui-col-md3   selector" config-form-type="searchcore" ez-type="datetimerange" ez-label="日期时间区间"
         th:classappend="${#strings.isEmpty(model.col)?'layui-col-md3':'layui-col-md'+model.col}">
        <div class="layui-form-item ">
            <label class="layui-form-label  ">日期时间区间</label>
            <div class="layui-input-block">
                <div class="ez-daterange-parent  ">
                    <div class="layui-input-inline ez-range ez-daterange" style="margin-right: 0;width:30px!important">
                        <div class="layui-input-wrap">
                            <div class="layui-input-prefix">
                                <i class="layui-icon layui-icon-date"></i>
                            </div>
                            <input  PLACEHOLDER="开始时间"  autocomplete="off" type="text"
                                    class="layui-input layui-date"
                                    name="default" >
                        </div>
                    </div>
                    <div class="layui-form-mid">-</div>
                    <div class="layui-input-inline ez-range ez-daterange" style="margin-right: 0;width:30px!important">

                        <div class="layui-input-wrap">
                            <div class="layui-input-prefix">
                                <i class="layui-icon layui-icon-date"></i>
                            </div>

                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<div id="content">
     <div class="selector layui-col-space10  list-item " config-form-type="searchcore" th:classappend="${#strings.isEmpty(model.col)?'layui-col-md3':'layui-col-md'+model.col}"
          ez-type="datetimerange"
             th:style="${model.style}"
             th:ITEM_NAME="${model.item_name}"
             th:ez-name="${model.item_name}"
          th:ez-label="${model.label}"
          th:ez-item_name="${model.item_name}"
          th:ez-placeholder="${model.placeholder}"
          th:ez-alias="${model.alias}"
          th:ez-col="${model.col}"
          th:ez-url="${model.url}"

          th:ez-data="${model.data}"
          th:ez-datatype="${model.datatype}"
          th:ez-item_desc="${model.item_desc}"
          th:ez-top_desc="${model.top_desc}"
          th:ez-jdbctype="${model.jdbctype}"
          th:ez-lay_verify="${#strings.isEmpty(model.lay_verify)?'':model.lay_verify}"
          th:ez-valid_rule="${model.valid_rule}"
          th:ez-valid_msg="${model.valid_msg}"
          th:ez-style="${model.style}"

          th:classappend="${(model.plugin=='hidden'||model.plugin=='input-hidden')?'list-item-hidden':''}"
        >
    <div  class="layui-form-item" >
        <label class="layui-form-label" th:for="${'itemId-' + model.item_name}"
               th:text="${model.label}" th:title="${model.label}">Date range:</label>
        <div class="ez-daterange-parent ">
        <div class="layui-input-inline ez-range ez-datetimerange " style="margin-right: 0">
            <input autocomplete="off" type="text" class="layui-input layui-datetime"
                   th:value="${model.itemParamValueStart}"
                   th:name="${model.item_name+'_START'}"
                   th:id="${model.item_name+'_START_ID'}"
            >
        </div>
        <div class="layui-form-mid"  >-</div>
        <div class="layui-input-inline ez-range ez-datetimerange" style="margin-right: 0">
            <input autocomplete="off" type="text" class="layui-input layui-datetime"
                   th:value="${model.itemParamValueEnd}"
                   th:name="${model.item_name+'_END'}" th:id="${model.item_name+'_END_ID'}"
            >
        </div>
    </div>
    </div>
</div>

 </div>
</body>
</html>
