<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>搜索-日期时间范围</title>
</head>
<body id="datetimerange" type="search">
     <div class=" layui-col-md3 list-item "
             th:style="${model.getConfig('style')}"
             th:ITEM_NAME="${model.getConfig('item_name')}"
             th:ez-name="${model.getConfig('item_name')}"
             th:classappend="${(model.getConfig('plugin')=='hidden'||model.getConfig('plugin')=='input-hidden')?'list-item-hidden':''}"
        >
    <div  class="layui-form-item" >
        <label class="layui-form-label" th:for="${'itemId-' + model.getConfig('item_name')}"
               th:text="${model.getConfig('label')}" th:title="${model.getConfig('label')}">Date range:</label>
        <div class="ez-daterange-parent ">
        <div class="layui-input-inline ez-range ez-datetimerange " style="margin-right: 0">
            <input autocomplete="off" type="text" class="layui-input layui-datetime"
                   th:value="${model.getParam(model.getConfig('item_name')+'_START')}"
                   th:name="${model.getConfig('item_name')+'_START'}"
                   th:id="${model.getConfig('item_name')+'_START_ID'}"
            >
        </div>
        <div class="layui-form-mid">-</div>
        <div class="layui-input-inline ez-range ez-datetimerange" style="margin-right: 0">
            <input autocomplete="off" type="text" class="layui-input layui-datetime"
                   th:value="${model.getParam(model.getConfig('item_name')+'_END')}"
                   th:name="${model.getConfig('item_name')+'_END'}" th:id="${model.getConfig('item_name')+'_END_ID'}"
            >
        </div>
    </div>
    </div>
</div>
 </body>
</html>
