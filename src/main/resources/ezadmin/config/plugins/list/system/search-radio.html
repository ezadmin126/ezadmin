<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>搜索-单选</title>
</head>
<body id="search-radio"  >
<div th:if="${searchFlag}" th:ITEM_NAME="${model.item_name}" th:style="${model.style}"
     th:ITEM_ID="${model.item_name}">

    <label th:title="${model.label}" class="layui-form-label"
           th:for="${'itemId-' + model.item_name}" th:text="${model.label}"
           th:title="${model.label}">普通文本</label>
    <div class="layui-input-inline">
        <input type="radio" th:name="${model.item_name}"
               th:id="${'itemId-' + model.item_name}" th:value="${item.K}" th:title="${item.V}"
               th:each="item:${items}"
               th:checked="${model.itemParamValue==null?false:#strings.equals(model.itemParamValue+'',item.K+'')}">
    </div>

</div>
<div th:if="${tableSearchFlag}" th:ITEM_NAME="${model.item_name}" th:style="${model.style}"
     th:ITEM_ID="${model.item_name}" class="layui-inline list-item">

    <label th:title="${model.label}" class="layui-form-label"
           th:for="${'itemId-' + model.item_name}" th:text="${model.label}"
           th:title="${model.label}">普通文本</label>
    <div class="layui-input-inline">
        <input type="radio" th:name="${model.item_name}"
               th:id="${'itemId-' + model.item_name}" th:value="${item.K}" th:title="${item.V}"
               th:each="item:${items}"
               th:checked="${model.itemParamValue==null?false:#strings.equals(model.itemParamValue+'',item.K+'')}">
    </div>
    <div class="layui-form-mid" style="padding:0 !important;line-height: 30px;margin-right:0; ">
        <i class="tableSearch layui-icon layui-icon-ok-circle"
           th:tableSearch_item_name="${model.item_name}" style="color:#1E9FFF;cursor: pointer"></i></div>

</div>
</body>
</html>
