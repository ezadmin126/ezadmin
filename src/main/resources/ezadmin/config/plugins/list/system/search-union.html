<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>搜索-concat字段模糊搜索</title>
</head>
<body id="union" type="search">
<div th:if="${searchFlag}" th:ITEM_NAME="${model.getConfig('item_name')}" th:style="${model.getConfig('style')}"
     th:ITEM_ID="${model.getConfig('item_name')}" editor="item">
    <div class="layui-input-inline edit-unionsearch " style="width:100px"
         th:for="${'itemId-' + model.getConfig('item_name')}">
        <select style="width: 100%;" name="itemSearchKey">
            <option value="">关键字</option>
            <option th:selected="${model.getConfig('itemSearchKey')==null?false:#strings.equals(model.getConfig('itemSearchKey'),item.getConfig('item_name'))}"
                    th:value="${item.getConfig('item_name')}" th:text="${item.getConfig('label')}"
                    th:each="item:${itemNameList}">Alaska
            </option>
        </select>
    </div>
    <div th:class="${#strings.isEmpty(model.getConfig('itemSearchConcatValue'))?'layui-input-inline':'layui-input-inline layui-border-blue' } ">
        <input th:id="${'itemId-' + model.getConfig('item_name')}" type="text"
               th:placeholder="${model.getConfig('placeholder')}" th:title="${model.getConfig('placeholder')}"
               class="layui-input" th:value="${model.getConfig('itemSearchConcatValue')}" name="itemSearchConcatValue"
               th:aria-describedby="${'DESC_'+model.getConfig('item_name')}">
    </div>
</div>
<div th:if="${tableSearchFlag}" th:ITEM_NAME="${model.getConfig('item_name')}" th:style="${model.getConfig('style')}"
     th:ITEM_ID="${model.getConfig('item_name')}" editor="item" class="layui-inline list-item">
    <div class="layui-input-inline edit-unionsearch " style="width:100px"
         th:for="${'itemId-' + model.getConfig('item_name')}">
        <select style="width: 100%;" name="itemSearchKey">
            <option value="">关键字</option>
            <option th:selected="${model.getConfig('itemSearchKey')==null?false:#strings.equals(model.getConfig('itemSearchKey')+'',item.getConfig('item_name'))}"
                    th:value="${item.getConfig('item_name')}" th:text="${item.getConfig('label')}"
                    th:each="item:${itemNameList}">Alaska
            </option>
        </select>
    </div>
    <div th:class="${#strings.isEmpty(itemSearchConcatValue)?'layui-input-inline':'layui-input-inline layui-border-blue' } ">
        <input th:id="${'itemId-' + model.getConfig('item_name')}" type="text"
               th:placeholder="${model.getConfig('placeholder')}" th:title="${model.getConfig('placeholder')}"
               class="layui-input" th:value="${model.getConfig('itemSearchConcatValue')}" name="itemSearchConcatValue"
               th:aria-describedby="${'DESC_'+model.getConfig('item_name')}">
    </div>
    <div class="layui-form-mid" style="padding:0 !important;line-height: 30px;margin-right:0;">
        <i class="tableSearch layui-icon layui-icon-ok-circle"
           th:tableSearch_item_name="${model.getConfig('item_name')}" style="color:#1E9FFF;cursor: pointer"></i></div>
</div>

</body>
</html>
