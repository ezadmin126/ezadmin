<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>原生下拉框</title>
</head>
<body id="select" alias="input-select" type="search"
      icon="layui-icon-share">

<div id="template" >
    <div class="layui-col-space10 selector layui-col-md3" type="select">
        <div class="layui-form-item ">
            <label class="layui-form-label  ">原生下拉框</label>
            <div class="layui-input-block">
                <select name="default" style="width:100%" class="custom-select" lay-ignore>
                    <option value="">请选择</option>
                </select>
            </div>
        </div>
    </div>
</div>
<div id="content">
 <div class=" layui-col-md3 list-item selector" type="select"
     th:style="${model.style}"
     th:ITEM_NAME="${model.item_name}"
     th:ez-name="${model.item_name}"
     th:classappend="${(model.plugin=='hidden'||model.plugin=='input-hidden')?'list-item-hidden':''}"
>
    <div  class="layui-form-item" >
        <label th:title="${model.label}" class="layui-form-label"
               th:for="${'search-itemName-' + model.item_name}"
               th:text="${model.label}">原生下拉框</label>
        <div  class=" layui-input-block ">
            <select lay-search="" th:id="${'itemId-' + model.item_name}" style="width: 100%;"
                    th:name="${model.item_name}">
                <option value="" th:text="${model.placeholder}">请选择</option>
                <option th:selected="${model.itemParamValue==null?false:#strings.equals(model.itemParamValue+'',item.K+'')}"
                        th:value="${item.K}" th:text="${item.V}" th:each="item:${items}">Alaska
                </option>
            </select>
        </div>
    </div>
</div>
</div>
 </body>
</html>
