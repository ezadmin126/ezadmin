<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>原生下拉框</title>
</head>
<body id="select" alias="input-select" type="search"
      icon="layui-icon-share">

<div id="template" >
    <div class="layui-col-space10 selector layui-col-md3" type="select">
        <div class="layui-form-item ">
            <label class="layui-form-label  ">原生下拉框</label>
            <div class="layui-input-block">
                <select name="default" style="width:100%" class="custom-select" lay-ignore>
                    <option value="">请选择</option>
                </select>
            </div>
        </div>
    </div>
</div>
<div id="content">
 <div class=" layui-col-md3 list-item selector" type="select"
     th:style="${model.getConfig('style')}"
     th:ITEM_NAME="${model.getConfig('item_name')}"
     th:ez-name="${model.getConfig('item_name')}"
     th:classappend="${(model.getConfig('plugin')=='hidden'||model.getConfig('plugin')=='input-hidden')?'list-item-hidden':''}"
>
    <div  class="layui-form-item" >
        <label th:title="${model.getConfig('label')}" class="layui-form-label"
               th:for="${'search-itemName-' + model.getConfig('item_name')}"
               th:text="${model.getConfig('label')}">原生下拉框</label>
        <div th:class="${#strings.isEmpty(model.getParam(model.getConfig('item_name')))?'layui-input-block':'layui-input-block layui-border-blue' } ">
            <select lay-search="" th:id="${'itemId-' + model.getConfig('item_name')}" style="width: 100%;"
                    th:name="${model.getConfig('item_name')}">
                <option value="" th:text="${model.getConfig('placeholder')}">请选择</option>
                <option th:selected="${model.getParam(model.getConfig('item_name'))==null?false:#strings.equals(model.getParam(model.getConfig('item_name'))+'',item.K+'')}"
                        th:value="${item.K}" th:text="${item.V}" th:each="item:${items}">Alaska
                </option>
            </select>
        </div>
    </div>
</div>
</div>
 </body>
</html>
