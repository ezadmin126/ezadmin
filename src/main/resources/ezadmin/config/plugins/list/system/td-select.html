<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>下拉文本</title>
</head>
<body id="td-select" alias="25" type="td" icon="layui-icon-share">
<div id="template" >
    <li class="layui-nav-item selector" type="colcore" ez-type="td-select"> 下拉文本 </li>
</div>
<table>
    <tr id="content">
        <td th:edit_flag="${editFlag}" th:ITEM_NAME="${item_name}" th:ITEM_ID="${item_name}"
            th:class="${' ezadmin-td ezadmin-td-'+item_name}" th:style="${style}"

            th:classappend="${editFlag==1?'ez-view-group-parent':''}"
        >
            <div class="layui-elip  td-text" th:classappend="${editFlag==1?'ez-view-group':''}">
                <div th:each="item:${items}" th:remove="tag"
                     th:if="${dataInDb==null?false:#strings.equals(dataInDb+'',item.K+'')}"
                     th:title="${item.V}"
                     th:utext="${item.V}">
                </div>
            </div>
            <div class="td-edit layui-form" th:classappend="${editFlag==1?'ez-view-group':''}" style="display: none">
                <div class="layui-form-item">
                    <div class="layui-input-inline" style="width:80%!important;margin-right:5px">[(${editHtml})]</div>
                    <div class="layui-form-mid" style="padding:0 !important;line-height: 30px;margin-right:0">
                        <i class="saverow layui-icon layui-icon-ok-circle" title="保存" th:editExpress="${editExpress}"
                           style="color:#1E9FFF;cursor: pointer"></i></div>
                </div>

            </div>
        </td>
    </tr>
</table>
</body>
</html>
