<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>输入-纯文字</title>
</head>
<body id="input-span">

<input type="hidden" th:item_name="${item_name}" th:name="${item_name}" th:value="${value}">
<span th:style="${style}" type="text" class="layui-text form-block-span" th:name="${item_name}"
      th:id="${'ITEM_ID_' + item_name}"
      th:aria-describedby="${aria_describedby}" th:text="${value}"></span>

</body>
</html>
