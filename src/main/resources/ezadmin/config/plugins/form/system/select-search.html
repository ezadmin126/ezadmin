<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>下拉框-搜索</title>
</head>
<body id="select-search" alias="7">

<select th:v="${value}" th:label="${label}" th:style="${'width: 100%;'+style}" th:v="${value}" lay-search=""
        th:lay-verify="${#strings.isEmpty(lay_verify)?'':lay_verify}"
        th:lay-filter="${'lay_filter_'+item_name}"
        th:placeholder="${placeholder}" th:aria-describedby="${aria_describedby}"
        th:id="${'ITEM_ID_' + item_name}"
        th:name="${item_name}"
        th:item_name="${item_name}"
>
    <option value="">请选择</option>
    <option th:selected="${value==null?false:#strings.equals(value+'',item.K+'')}" th:value="${item.K}"
            th:text="${item.V}" th:each="item:${items}">Alaska
    </option>
</select>

</body>
</html>
