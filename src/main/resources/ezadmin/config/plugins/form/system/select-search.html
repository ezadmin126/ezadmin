<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>搜索下拉框</title>
</head>
<body id="select-search" alias="7" type="form" icon="layui-icon-slider">

<div id="template">
    <div class="layui-col-md12 selector" type="select-search">
        <div class="layui-form-item " style="margin-bottom: 0;">
            <label class="layui-form-label  ">搜索下拉框</label>
            <div class="layui-input-block">
                <select name="default" class=""></select>
            </div>
        </div>
    </div>
</div>
<div id="content">

    <div class=" selector" th:classappend="${'layui-col-md'+col}" type="select-search"
         th:d-label="${label}"
         th:d-item_name="${item_name}"
         th:d-placeholder="${placeholder}"
         th:d-alias="${alias}"
         th:d-col="${col}"
         th:d-data="${data}"
         th:d-datatype="${datatype}"
         th:d-item_desc="${item_desc}"
         th:d-top_desc="${top_desc}"
         th:d-jdbctype="${jdbctype}"
         th:d-lay_verify="${#strings.isEmpty(lay_verify)?'':lay_verify}"
         th:d-valid_rule="${valid_rule}"
         th:d-valid_msg="${valid_msg}"
         th:d-style="${style}"
         th:d-help="${help}"
    >
        <div class="layui-form-item " style="margin-bottom: 0;">
            <label class="layui-form-label  "   >
                <span class="layui-badge-dot" th:if="${not #strings.isEmpty(redRequired)}"></span>
                <i th:if="${not #strings.isEmpty(help)}"
                   th:id="${'ez-help-'+item_name}"
                   class="ez-help layui-icon-help layui-icon"
                   th:src="${help}"></i>
                [[${label}]]
            </label>
            <div class="layui-input-block">
                <small
                        class="layui-form-mid layui-text-em top_desc"
                        th:utext="${top_desc}" style="float:none"
                        th:if="${not #strings.isEmpty(top_desc)}">辅助文字(上)</small>

                <select th:v="${value}" th:label="${label}" th:style="${'width: 100%;'+style}" th:v="${value}" lay-search=""
                        th:lay-verify="${#strings.isEmpty(lay_verify)?'':lay_verify}"
                        th:lay-filter="${'lay_filter_'+item_name}"
                        th:placeholder="${placeholder}" th:aria-describedby="${aria_describedby}"
                        th:id="${'ITEM_ID_' + item_name}"
                        th:name="${item_name}"
                        th:item_name="${item_name}"
                >
                    <option value="">请选择</option>
                    <option th:selected="${value==null?false:#strings.equals(value+'',item.K+'')}" th:value="${item.K}"
                            th:text="${item.V}" th:each="item:${items}">Alaska
                    </option>
                </select>


                <small
                        class="layui-form-mid layui-text-em item_desc"
                        th:utext="${item_desc}"
                        th:if="${not #strings.isEmpty(item_desc)}">辅助文字(下)</small>
            </div>
        </div>
    </div>



</div>
</body>
</html>
