<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>输入-单选框</title>
</head>
<body id="input-radio" alias="form-radio" type="form" icon="layui-icon-circle">
<div id="template">
    <div class="layui-col-md12 selector" type="input-radio">
        <div class="layui-form-item " style="margin-bottom: 0;">
            <label class="layui-form-label  ">单选框</label>
            <div class="layui-input-block">
                <input type="radio" name="default" placeholder="请输入"  >
            </div>
        </div>
    </div>
</div>
<div id="content">
    <div class=" selector" th:classappend="${'layui-col-md'+col}" type="input-radio"
         th:d-label="${label}"
         th:d-item_name="${item_name}"
         th:d-placeholder="${placeholder}"
         th:d-alias="${alias}"
         th:d-col="${col}"

         th:d-item_desc="${item_desc}"
         th:d-top_desc="${top_desc}"
         th:d-jdbctype="${jdbctype}"
         th:d-lay_verify="${#strings.isEmpty(lay_verify)?'':lay_verify}"
         th:d-valid_rule="${valid_rule}"
         th:d-valid_msg="${valid_msg}"
         th:d-style="${style}"
         th:d-help="${help}"
    >
        <div class="layui-form-item " style="margin-bottom: 0;">
            <label class="layui-form-label  "   >
                <span class="layui-badge-dot" th:if="${not #strings.isEmpty(redRequired)}"></span>
                <i th:if="${not #strings.isEmpty(help)}"
                   th:id="${'ez-help-'+item_name}"
                   class="ez-help layui-icon-help layui-icon"
                   th:src="${help}"></i>
                [[${label}]]
            </label>
            <div class="layui-input-block">
                <small
                        class="layui-form-mid layui-text-em top_desc"
                        th:utext="${top_desc}" style="float:none"
                        th:if="${not #strings.isEmpty(top_desc)}">辅助文字(上)</small>

                <input th:style="${style}" th:label="${label}"
                       th:lay-verify="${#strings.isEmpty(lay_verify)?'':lay_verify}"
                       type="radio" th:name="${item_name}"
                       th:value="${item.K}" th:title="${item.V}" th:each="item:${items}"
                       th:checked="${value==null?false:#strings.equals(value+'',item.K+'')}">


                <small
                        class="layui-form-mid layui-text-em item_desc"
                        th:utext="${item_desc}"
                        th:if="${not #strings.isEmpty(item_desc)}">辅助文字(下)</small>
            </div>
        </div>
    </div>


</div>
</body>
</html>
