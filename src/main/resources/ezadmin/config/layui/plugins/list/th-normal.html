<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>表头</title>
</head>
<body id="th" alias="18" type="th">
<table>
    <thead>
    <tr id="content">
        <th thead th:jdbctype="${jdbctype}" scope="col" th:style="${'color:black;min-width:102px;'+style}"
            th:classappend="${'list-item-'+item_name}"
            class=" ez-view-group-parent1     list-item  " th:item_name="${item_name}" th:name="${name}"
            th:lay-options='${laydata}'
        >
            <div th:class="${#strings.isEmpty(searchHtml)?'':'ez-view-group1'}">
                <span th:text="${label}" style="float:left"></span>
                <span class="layui-table-sort layui-inline" th:if="${order==1}"
                      th:lay-sort="${#strings.isEmpty(itemParamOrderValue)?'':( #strings.equals('1',itemParamOrderValue) ? 'desc':'asc')}">
                 <i class="layui-edge layui-table-sort-asc order-icon" title="升序"
                    th:ITEM_NAME="${ordertype}"
                    th:ITEM_VALUE="${itemParamOrderValue}"></i>
                 <i class="layui-edge layui-table-sort-desc order-icon" title="降序"
                    th:ITEM_NAME="${ordertype}"
                    th:ITEM_VALUE="${itemParamOrderValue}"></i>
             </span>
                <span class="edit-table-head" style="float: right; ">

            <i th:if="${editflag==1}" class=" layui-icon layui-icon-edit" title="此列双击可以编辑"></i>
         </span>
            </div>

        </th>

    </tr>
    </thead>
</table>
</body>
</html>
