<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>搜索-Sql级联下拉</title>
</head>
<body id="search-cascadersql" type="search">
<style>.el-input__inner {
    height: 26px;
    line-height: 26px
}</style>
<div th:if="${searchFlag}" th:style="${model.getConfig('style')}" th:ITEM_NAME="${model.getConfig('item_name')}"
     th:ITEM_ID="${model.getConfig('item_name')}" style='z-index:101'
     class=" ">
    <label class="layui-form-label" th:for="${'itemName-' + model.getConfig('item_name')}"
           th:text="${model.getConfig('label')}" th:title="${model.getConfig('label')}">普通文本</label>
    <div th:class="${#strings.isEmpty(model.getParam(model.getConfig('item_name')))?'layui-input-inline':'layui-input-inline layui-border-blue' } ">
        <input th:value="${#strings.isEmpty(model.getParam(model.getConfig('item_name')))?'':model.getParam(model.getConfig('item_name'))}"
               th:name="${model.getConfig('item_name')}" th:id="${'search-itemName-' + model.getConfig('item_name')}"
               class="ez-laycascader"
               th:itemsJson="${itemsJson}"
               ez_value="ID" ez_label="LABEL"
               th:multi="${model.getConfig('multi')}"
               th:collapseTags="${model.getConfig('collapsetags')}"
               th:showAllLevels="${model.getConfig('showalllevels')}"
               th:placeholder="${model.getConfig('placeholder')}">
    </div>
    <div class="layui-form-mid" style="padding:0 !important;line-height: 30px;margin-right:0;display:none">
        <i class="tableSearch layui-icon layui-icon-ok-circle"
           th:tableSearch_item_name="${model.getConfig('item_name')}" style="color:#1E9FFF;cursor: pointer"></i></div>
</div>
<div th:if="${tableSearchFlag}" th:style="${model.getConfig('style')}" style='z-index:101'
     class="layui-inline list-item">
    <label
            class="layui-form-label" th:for="${'itemName-' + model.getConfig('item_name')}"
            th:text="${model.getConfig('label')}" th:title="${model.getConfig('label')}">普通文本</label>
    <div style="width:45%"
         th:class="${#strings.isEmpty(model.getParam(model.getConfig('item_name')))?'layui-input-inline':'layui-input-inline layui-border-blue' } ">
        <input th:value="${#strings.isEmpty(model.getParam(model.getConfig('item_name')))?'':model.getParam(model.getConfig('item_name'))}"
               th:name="${model.getConfig('item_name')}" th:id="${'search-itemName-' + model.getConfig('item_name')}"
               class="ez-laycascader"
               th:itemsJson="${itemsJson}"
               ez_value="ID" ez_label="LABEL"
               th:multi="${model.getConfig('multi')}"
               th:collapseTags="${model.getConfig('collapsetags')}"
               th:showAllLevels="${model.getConfig('showalllevels')}"
               th:placeholder="${model.getConfig('placeholder')}">
    </div>
    <div class="layui-form-mid" style="padding:0 !important;line-height: 30px;margin-right:0">
        <i class="tableSearch layui-icon layui-icon-ok-circle"
           th:tableSearch_item_name="${model.getConfig('item_name')}" style="color:#1E9FFF;cursor: pointer"></i></div>
</div>
</body>
</html>
