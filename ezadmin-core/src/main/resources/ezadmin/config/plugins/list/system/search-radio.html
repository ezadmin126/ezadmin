<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>搜索-单选</title>
</head>
<body id="search-radio" type="search">
<div th:if="${searchFlag}" th:ITEM_NAME="${model.getConfig('item_name')}" th:style="${model.getConfig('style')}"
     th:ITEM_ID="${model.getConfig('item_name')}">

    <label th:title="${model.getConfig('label')}" class="layui-form-label"
           th:for="${'itemId-' + model.getConfig('item_name')}" th:text="${model.getConfig('label')}"
           th:title="${model.getConfig('label')}">普通文本</label>
    <div class="layui-input-inline">
        <input type="radio" th:name="${model.getConfig('item_name')}"
               th:id="${'itemId-' + model.getConfig('item_name')}" th:value="${item.K}" th:title="${item.V}"
               th:each="item:${items}"
               th:checked="${model.getParam(model.getConfig('item_name'))==null?false:#strings.equals(model.getParam(model.getConfig('item_name'))+'',item.K+'')}">
    </div>

</div>
<div th:if="${tableSearchFlag}" th:ITEM_NAME="${model.getConfig('item_name')}" th:style="${model.getConfig('style')}"
     th:ITEM_ID="${model.getConfig('item_name')}" class="layui-inline list-item">

    <label th:title="${model.getConfig('label')}" class="layui-form-label"
           th:for="${'itemId-' + model.getConfig('item_name')}" th:text="${model.getConfig('label')}"
           th:title="${model.getConfig('label')}">普通文本</label>
    <div class="layui-input-inline">
        <input type="radio" th:name="${model.getConfig('item_name')}"
               th:id="${'itemId-' + model.getConfig('item_name')}" th:value="${item.K}" th:title="${item.V}"
               th:each="item:${items}"
               th:checked="${model.getParam(model.getConfig('item_name'))==null?false:#strings.equals(model.getParam(model.getConfig('item_name'))+'',item.K+'')}">
    </div>
    <div class="layui-form-mid" style="padding:0 !important;line-height: 30px;margin-right:0; ">
        <i class="tableSearch layui-icon layui-icon-ok-circle"
           th:tableSearch_item_name="${model.getConfig('item_name')}" style="color:#1E9FFF;cursor: pointer"></i></div>

</div>
</body>
</html>
