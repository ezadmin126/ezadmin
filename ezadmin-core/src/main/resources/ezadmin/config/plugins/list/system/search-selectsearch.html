<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>搜索-搜索下拉框</title>
</head>
<body id="select-search" alias="20" type="search">
<div th:if="${searchFlag}" th:ITEM_NAME="${model.getConfig('item_name')}" th:style="${model.getConfig('style')}"
     th:ITEM_ID="${model.getConfig('item_name')}">
    <label class="layui-form-label" th:for="${'search-itemName-' + model.getConfig('item_name')}"
           th:text="${model.getConfig('label')}" th:title="${model.getConfig('label')}">普通文本</label>
    <div th:class="${#strings.isEmpty(model.getParam(model.getConfig('item_name')))?'layui-input-inline':'layui-input-inline layui-border-blue' } ">
        <select lay-search="" th:id="${'search-itemName-' + model.getConfig('item_name')}" style="width: 100%;"
                th:name="${model.getConfig('item_name')}">
            <option value="" th:text="${model.getConfig('placeholder')}">请选择</option>
            <option th:selected="${model.getParam(model.getConfig('item_name'))==null?false:#strings.equals(model.getParam(model.getConfig('item_name'))+'',item.K+'')}"
                    th:value="${item.K}" th:text="${item.V}" th:each="item:${items}">Alaska
            </option>
        </select>
    </div>
</div>
<div th:if="${tableSearchFlag}" th:style="${model.getConfig('style')}" class="layui-inline list-item">
    <label th:title="${model.getConfig('label')}" class="layui-form-label"
           th:for="${'search-itemName-' + model.getConfig('item_name')}"
           th:text="${model.getConfig('label')}">普通文本</label>

    <div style="width:100px;"
         th:class="${#strings.isEmpty(model.getParam(model.getConfig('item_name')))?'layui-input-inline':'layui-input-inline layui-border-blue' } ">
        <select lay-filter="tableSearchFilter" lay-search="" th:id="${'table-itemName-' + model.getConfig('item_name')}"
                th:name="${model.getConfig('item_name')}">
            <option value="" th:text="${model.getConfig('placeholder')}">请选择</option>
            <option th:selected="${model.getParam(model.getConfig('item_name'))==null?false:#strings.equals(model.getParam(model.getConfig('item_name'))+'',item.K+'')}"
                    th:value="${item.K}" th:text="${item.V}" th:each="item:${items}">Alaska
            </option>
        </select>
    </div>
    <div class="layui-form-mid" style="padding:0 !important;line-height: 30px;margin-right:0">
        <i class="tableSearch layui-icon layui-icon-ok-circle"
           th:tableSearch_item_name="${model.getConfig('item_name')}" style="color:#1E9FFF;cursor: pointer"></i></div>
</div>
</body>
</html>
