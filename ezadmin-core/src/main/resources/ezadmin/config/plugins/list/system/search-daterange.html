<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>搜索-日期范围</title>
</head>
<body id="daterange" alias="17" type="search">
<div th:if="${searchFlag}" th:ITEM_NAME="${model.getConfig('item_name')}" th:style="${model.getConfig('style')}"
     th:ITEM_ID="${model.getConfig('item_name')}">
    <label class="layui-form-label" th:for="${'search-itemName-' + model.getConfig('item_name')}"
           th:text="${model.getConfig('label')}" th:title="${model.getConfig('label')}">Date range:</label>
    <div class="ez-daterange-parent layui-input-inline">
        <div class="layui-input-inline ez-range ez-daterange" style="margin-right: 0">
            <input PLACEHOLDER="开始时间" autocomplete="off" type="text" class="layui-input layui-date"
                   th:value="${model.getParam(model.getConfig('item_name')+'_START')}"
                   th:name="${model.getConfig('item_name')+'_START'}"
                   th:id="${model.getConfig('item_name')+'_START_ID'}">
        </div>
        <div class="layui-form-mid">-</div>
        <div class="layui-input-inline ez-range ez-daterange" style="margin-right: 0">
            <input PLACEHOLDER="结束时间" autocomplete="off" type="text" class="layui-input layui-date"
                   th:value="${model.getParam(model.getConfig('item_name')+'_END')}"
                   th:name="${model.getConfig('item_name')+'_END'}" th:id="${model.getConfig('item_name')+'_END_ID'}">
        </div>
    </div>
</div>
<div th:if="${tableSearchFlag}" th:style="${model.getConfig('style')}" class="layui-inline list-item">
    <label style="min-width: 80px" class="layui-form-label"
           th:for="${'search-itemName-' + model.getConfig('item_name')}" th:text="${model.getConfig('label')}"
           th:title="${model.getConfig('label')}">Date range:</label>
    <div class="ez-daterange-parent layui-input-inline">
        <div class="layui-input-inline ez-range ez-daterange" style="margin-right: 0;width:45%">
            <input PLACEHOLDER="开始时间" autocomplete="off" type="text" class="layui-input  "
                   th:value="${model.getParam(model.getConfig('item_name')+'_START') }"
                   th:name="${model.getConfig('item_name')+'_START'}"
                   th:id="${model.getConfig('item_name')+'_TABLE_START_ID'}">
        </div>
        <div class="layui-form-mid" style="    height: 34px;
    margin-top: -7px;
    margin-right: 5px;
    margin-left: 5px;">-
        </div>
        <div class="layui-input-inline ez-range ez-daterange" style="margin-right: 0;width:45%">
            <input PLACEHOLDER="结束时间" autocomplete="off" type="text" class="layui-input  "
                   th:value="${model.getParam(model.getConfig('item_name')+'_END') }"
                   th:name="${model.getConfig('item_name')+'_END'}"
                   th:id="${model.getConfig('item_name')+'_TABLE_END_ID'}">
        </div>
    </div>
    <div class="layui-form-mid" style="padding:0 !important;line-height: 30px;margin-right:0">
        <i class="tableSearch layui-icon layui-icon-ok-circle"
           th:tableSearch_item_name="${model.getConfig('item_name')}" style="color:#1E9FFF;cursor: pointer"></i></div>
</div>
</body>
</html>
