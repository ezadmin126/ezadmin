<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>搜索-多选下拉</title>
</head>
<body id="xmselect" alias="xm-select" type="search">
<div th:if="${searchFlag}" th:style="${model.getConfig('style')}" th:ITEM_NAME="${model.getConfig('item_name')}"
     th:ITEM_ID="${model.getConfig('item_name')}">
    <label class="layui-form-label" th:for="${'itemName-' + model.getConfig('item_name')}"
           th:text="${model.getConfig('label')}" th:title="${model.getConfig('label')}">普通文本</label>
    <div th:class="${#strings.isEmpty(model.getParam(model.getConfig('item_name')))?'layui-input-inline':'layui-input-inline layui-border-blue' } ">
        <div th:itemPlaceholder="${model.getConfig('placeholder')}" th:itemsJson="${itemsJson}" class="ez-xmselect"
             th:id="${'itemName-' + model.getConfig('item_name')}" th:name="${model.getConfig('item_name')}"
             th:value="${#strings.isEmpty(model.getParam(model.getConfig('item_name')))?'[]':'['+model.getParam(model.getConfig('item_name'))+']'}"></div>
    </div>
</div>
<div th:if="${tableSearchFlag}" th:style="${model.getConfig('style')}" th:ITEM_NAME="${model.getConfig('item_name')}"
     th:ITEM_ID="${model.getConfig('item_name')}" class="layui-inline list-item">
    <label class="layui-form-label" th:for="${'itemName-' + model.getConfig('item_name')}"
           th:text="${model.getConfig('label')}" th:title="${model.getConfig('label')}">普通文本</label>
    <div th:class="${#strings.isEmpty(model.getParam(model.getConfig('item_name')))?'layui-input-inline':'layui-input-inline layui-border-blue' } "
         style="width:100px;">
        <div th:ITEM_NAME="${model.getConfig('item_name')}" th:placeholder="${model.getConfig('placeholder')}"
             th:itemsJson="${itemsJson}" class="ez-xmselect-table"
             th:id="${'ez-xmselect-table-' + model.getConfig('item_name')}" th:name="${model.getConfig('item_name')}"
             th:value="${#strings.isEmpty(model.getParam(model.getConfig('item_name')))?'[]':'['+model.getParam(model.getConfig('item_name'))+']'}"></div>
    </div>
    <div class="layui-form-mid" style="padding:0 !important;line-height: 30px;margin-right:0;">
        <i class="tableSearch layui-icon layui-icon-ok-circle"
           th:tableSearch_item_name="${model.getConfig('item_name')}" style="color:#1E9FFF;cursor: pointer"></i></div>
</div>


</body>
</html>
