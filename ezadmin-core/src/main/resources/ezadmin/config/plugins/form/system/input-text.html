<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>输入-单行文本</title>
</head>
<body id="input-text" alias="1" alias2="input">
<input type="text" class="layui-input"
       th:style="${style}"
       th:readonly="${readonly}"
       th:disabled="${disabled}"
       th:lay-verify="${#strings.isEmpty(lay_verify)?'':lay_verify}"
       th:lay-filter="${'lay_filter_'+item_name}"
       th:placeholder="${placeholder}"
       th:value="${value}"
       th:label="${label}"
       th:name="${item_name}"
       th:item_name="${item_name}"
       th:id="${'ITEM_ID_' + item_name}"
       th:test="${test}"
       th:aria-describedby="${label}"
>
</body>
</html>
