<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>下拉框-原生</title>
</head>
<body id="select" alias="6">

<select th:v="${value}" th:label="${label}" th:style="${'width: 100%;'+style}" th:readonly="${readonly}"
        th:disabled="${disabled}"
        th:lay-filter="${'lay_filter_'+item_name}"
        th:lay-verify="${#strings.isEmpty(lay_verify)?'':lay_verify}"
        th:aria-describedby="${aria_describedby}"
        th:id="${'ITEM_ID_' + item_name}" class="form-control  " th:name="${item_name}">
    <option value="">请选择</option>
    <option th:selected="${value==null?false:#strings.equals(value+'',item.K+'')}" th:value="${item.K}"
            th:text="${item.V}" th:each="item:${items}">Alaska
    </option>
</select>

</body>
</html>
