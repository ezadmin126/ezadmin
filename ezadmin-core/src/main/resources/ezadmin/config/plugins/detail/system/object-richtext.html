<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>富文本</title>
</head>
<body id="richtext">

<div style="" th:aria-describedby="${'DESC_'+item_name}" th:id="${'ITEM_ID_'+item_name}" class="richtext">
    <div th:id="${'toolbar_ITEM_ID_'+item_name}"><!-- 工具栏 --></div>
    <div th:id="${'editor_ITEM_ID_'+item_name}" class="editor-richtext"><!-- 编辑器 --></div>
</div>
<!-- 内容状态 -->
<textarea th:lay-verify="${#strings.isEmpty(lay_verify)?'':lay_verify}" rich="1" th:name="${item_name}"
          th:id="${'DESC_ITEM_ID_'+item_name}" style="display: none" th:utext="${value}"></textarea>
</body>
</html>
