<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>template</title>
    <link rel="stylesheet" href="https://unpkg.com/mvp.css">
</head>
<body id="formtemplate" datasource="datasource" success_url="reload">
<div id="append_head" class="append"></div>
<div >
    <form id="inputForm" method="post" class="layui-form">
        <div class="layui-card" group_name="EZ_DEFAULT_GROUP">
            <div class="layui-card-header">
                EZ_DEFAULT_GROUP
            </div>
            <div class="layui-card-body">
            </div>
        </div>
    </form>
    <form id="configForm" class="layui-form">
        <div class="layui-form-item ">
            <label >初始表达式</label>
            <div >
                <pre   name="init_express" item_name="init_express" type=""></pre>
            </div>
        </div>
        <div class="layui-form-item ">
            <label >提交表达式</label>
            <div >
                <pre  name="submit_express" item_name="submit_express"  type=""> </pre>
            </div>
        </div>
        <div class="layui-form-item ">
            <label >删除表达式</label>
            <div >
                <pre   name="delete_express" item_name="delete_express" type=""></pre>
            </div>
        </div>
        <div class="layui-form-item ">
            <label >状态表达式</label>
            <div >
                <pre  name="status_express" item_name="status_express" type=""></pre>
            </div>
        </div>
        <div class="layui-form-item ">
            <label >分组表达式</label>
            <div >
                <pre  name="group_data" item_name="group_data" type=""></pre>
            </div>
        </div>
    </form>
</div>

<div id="append_foot" class="append">
</div>
</body>
</html>
