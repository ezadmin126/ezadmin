     <th item_name="BLOG_TITLE">标题</th>
     <th item_name="BLOG_SUB_TITLE">副标题</th>
     <th item_name="STATUS">STATUS</th>

    </tr>
   </tbody>
  </table>
  <pre id="express" orderby="" groupby="">

<![CDATA[ 
StringBuilder sql=new StringBuilder();
sql.append("
    SELECT
        T.BLOG_ID ID,
        BLOG_TITLE,
        BLOG_SUB_TITLE,
        STATUS,
        CATEGORY_ID,
        BLOG_CONTENT,
        ADD_TIME 
    FROM
        T_BLOG T where status=1");
return search(sql);
]]>
