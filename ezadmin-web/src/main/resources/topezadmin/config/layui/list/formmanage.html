<html>
 <head>
  <title></title>
 </head>
 <body id="formmanage" datasource="ez-dataSource">
  <div id="append_head"></div>
  <ul id="tab">
  </ul>
  <form id="search">
   <div>
    <label>表单编码</label>
    <div>
     <object item_name="EZ_CODE" type="input-text"></object>
    </div>
   </div>
   <div>
    <label>添加时间</label>
    <div>
     <object item_name="ADD_TIME" jdbctype="DATETIME" type="daterange"></object>
    </div>
   </div>
   <div>
    <label>修改时间</label>
    <div>
     <object item_name="UPDATE_TIME" jdbctype="DATETIME" type="daterange"></object>
    </div>
   </div>
   <div>
    <label>数据源</label>
    <div>
     <object item_name="DATASOURCE" type="input-text"></object>
    </div>
   </div>
  </form>
  <div id="tableButton">
   <button opentype="_BLANK" url="/ezform/loadEdit.html" item_name="addd" type="button-table">新增</button>
      <button opentype="_BLANK" windowname="SQL生成表单" url="/ezlist/importSql.html" item_name="addd2" type="button-table">SQL生成表单</button>

  </div>
  <table>
   <tbody>
    <tr id="column">
     <th id="rowbutton" width="200" fixed="right">
          <button opentype="_BLANK" url="/ezform/loadEdit.html?cloudId=${ID}" item_name="update" type="button-single" class="layui-border-blue">可视化编辑</button>
         <button opentype="_BLANK" url="/ezlist/export.html?cloudId=${ID}&amp;ezType=2" item_name="export" type="button-single" class="layui-border-orange">源码编辑</button>
     </th>
     <th item_name="ID" width="70" minwidth="70" fixed="left" body="td-numbers"  >ID</th>
        <th item_name="EZ_NAME">表单名称</th>
     <th item_name="EZ_CODE" url="/topezadmin/form/form-${EZ_CODE}" opentype="_BLANK" body="td-link">表单编码</th>
     <th item_name="ADD_TIME" jdbctype="DATETIME">添加时间</th>
     <th item_name="UPDATE_TIME" jdbctype="DATETIME">修改时间</th>
     <th item_name="DATASOURCE">数据源</th>
    </tr>
   </tbody>
  </table>
  <pre id="express" orderby="ORDER BY UPDATE_TIME DESC" groupby="">

<![CDATA[ 
StringBuilder sql=new StringBuilder();
sql.append("
    SELECT
        ID,
        EZ_CODE,EZ_NAME,
        APP_NAME,
        ADD_TIME,
        UPDATE_TIME,
        DATASOURCE 
    FROM
        t_ez_cloud tec 
    WHERE
        tec.IS_DEL = 0 
        AND EZ_TYPE = 2");
return search(sql);
]]>


  </pre>
  <pre id="count">

</pre>
  <pre item_name="displayorder_express" type=""></pre>
  <div id="append_foot"></div>
 </body>
</html>
