<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>修改密码</title>
    <!-- Font Awesome -->
    <link  th:href="${'/webjars/ezadmin/plugins/font-awesome/css/all.min.css'}"   rel="stylesheet">
    <!-- icheck bootstrap -->
    <link rel="stylesheet" href="/webjars/ezadmin/plugins/icheck-bootstrap/icheck-bootstrap.min.css">
    <!-- Theme style -->
    <link rel="stylesheet"  href="/webjars/ezadmin/plugins/adminlte/css/adminlte.min.css" />
</head>
<body class="hold-transition login-page">
<div class="login-box">
    <div class="card card-outline card-primary">
        <div class="card-header text-center">
            <a href="#" class="h1">重置密码</a>
        </div>
        <div class="card-body">
            <p class="login-box-msg">请提交表单修改密码.</p>
            <form action="login.html" method="post">
                <div class="input-group mb-3">
                    <input type="password" name="password1" required class="form-control" placeholder="当前密码">
                    <div class="input-group-append">
                        <div class="input-group-text">
                            <span class="fas fa-lock"></span>
                        </div>
                    </div>
                </div>
                <div class="input-group mb-3">
                    <input type="password" name="password2" required class="form-control" placeholder="新密码">
                    <div class="input-group-append">
                        <div class="input-group-text">
                            <span class="fas fa-lock"></span>
                        </div>
                    </div>
                </div>
                <div class="input-group mb-3">
                    <input type="password" name="password3" required class="form-control" placeholder="重新输入新密码">
                    <div class="input-group-append">
                        <div class="input-group-text">
                            <span class="fas fa-lock"></span>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary btn-block">修改密码</button>
                    </div>
                    <!-- /.col -->
                </div>
            </form>

            <p class="mt-3 mb-1">
                <a href="/login/login.html">登录</a>
            </p>
        </div>
        <!-- /.login-card-body -->
    </div>
</div>
<!-- /.login-box -->

<!-- jQuery -->
<script th:src="${'/webjars/ezadmin/plugins/jquery/jquery.min.js'}"></script>
<!-- Bootstrap 4 -->
<script th:src="${'/webjars/ezadmin/plugins/bootstrap/js/bootstrap.bundle.min.js'}"/>
<script th:src="${'/webjars/ezadmin/plugins/adminlte/js/adminlte.min.js'}"/>

</body>
</html>
