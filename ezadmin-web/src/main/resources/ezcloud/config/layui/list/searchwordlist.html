<html>
 <head>
  <title>搜索词明细</title>
 </head>
 <body id="searchwordlist" datasource="op-dataSource" export="1">
  <div id="append_head"></div>
  <ul id="tab">
  </ul>
  <form id="search">
   <div>
    <label>搜索词</label>
    <div>
     <object item_name="KEYWORD" type="input-text"></object>
    </div>
   </div>
   <div>
    <label>搜索时间</label>
    <div>
     <object item_name="ADD_TIME" jdbctype="DATETIME" type="daterange"></object>
    </div>
   </div>
   <div>
    <label>终端</label>
    <div>
     <object item_name="TERMINAL_TYPE" datatype="JSON" data="[{&quot;V&quot;:&quot;PC&quot;,&quot;K&quot;:&quot;1&quot;},{&quot;V&quot;:&quot;APP&quot;,&quot;K&quot;:&quot;2&quot;},{&quot;V&quot;:&quot;M&quot;,&quot;K&quot;:&quot;3&quot;}]" type="select-search"></object>
    </div>
   </div>
  </form>
  <div id="tableButton">
   <button opentype="_BLANK_PARAM" url="/ezcloud/list/export-searchwordlist" item_name="导出" type="button-table">导出</button>
   <button item_name="a" type="button-span">仅展示一年内数据</button>
  </div>
  <table>
   <tbody>
    <tr id="column">
     <th id="rowbutton"></th>
     <th item_name="ID" head="th-numbers" width="60" fixed="left">ID</th>
     <th item_name="KEYWORD">搜索词</th>
     <th item_name="PLATFORM_ID" body="td-select" datatype="JSON" data="[{&quot;V&quot;:&quot;贝登&quot;,&quot;K&quot;:&quot;1&quot;},{&quot;V&quot;:&quot;医械购&quot;,&quot;K&quot;:&quot;2&quot;}]">所属平台</th>
     <th item_name="TERMINAL_TYPE" body="td-select" datatype="JSON" data="[{&quot;V&quot;:&quot;PC&quot;,&quot;K&quot;:&quot;1&quot;},{&quot;V&quot;:&quot;APP&quot;,&quot;K&quot;:&quot;2&quot;},{&quot;V&quot;:&quot;M&quot;,&quot;K&quot;:&quot;3&quot;}]">终端</th>
     <th item_name="MAX_SEARCH_COUNT" order="1">搜索结果数量</th>
     <th item_name="WORD_COUNT" order="1">搜索次数</th>
     <th item_name="ADD_TIME" jdbctype="DATETIME">搜索时间</th>
     <th item_name="USER_IP">用户IP</th>
    </tr>
   </tbody>
  </table>
  <pre id="express" orderby="" groupby="GROUP BY KEYWORD
    HAVING MAX_SEARCH_COUNT = 0">

<![CDATA[ 
StringBuilder sql=new StringBuilder();
sql.append("
    SELECT
        WORD_ID ID,
        KEYWORD,
        PLATFORM_ID,
        SEARCH_COUNT,
        TERMINAL_TYPE,
        USER_IP,ADD_TIME,count(WORD_ID) WORD_COUNT,
        SPIDER_REQUEST, MAX(SEARCH_COUNT) AS MAX_SEARCH_COUNT
    FROM
        V_USER_SEARCH_WORD 
    WHERE
        PLATFORM_ID = 1  AND ADD_TIME > DATE_SUB(NOW(),interval  1 YEAR)");
return search(sql);
]]>


  </pre>
  <pre id="count">

</pre>
  <pre item_name="displayorder_express" type="">

<![CDATA[ 

]]>


  </pre>
  <div id="append_foot"></div>
 </body>
</html>
