<html>
 <head>
  <title>限购促销管理</title>
 </head>
 <body id="promotionList" datasource="op-dataSource">
  <div id="append_head"></div>
  <ul id="tab">
  </ul>
  <form id="search">
   <div>
    <label>限购名称</label>
    <div>
     <object item_name="ACTION_NAME" alias="vpa" type="input-text"></object>
    </div>
   </div>
   <div>
    <label>限购类型</label>
    <div>
     <object item_name="LIMIT_TYPE" datatype="JSON" data="[{&quot;V&quot;:&quot;限单品&quot;,&quot;K&quot;:&quot;1&quot;},{&quot;V&quot;:&quot;限分类&quot;,&quot;K&quot;:&quot;2&quot;}
,{&quot;V&quot;:&quot;限品牌&quot;,&quot;K&quot;:&quot;3&quot;}]" alias="vpl" type="select-search"></object>
    </div>
   </div>
   <div>
    <label>活动状态</label>
    <div>
     <object item_name="STATE" datatype="JSON" data="[{&quot;V&quot;:&quot;未生效&quot;,&quot;K&quot;:&quot;1&quot;},{&quot;V&quot;:&quot;生效中&quot;,&quot;K&quot;:&quot;2&quot;}
,{&quot;V&quot;:&quot;已终止&quot;,&quot;K&quot;:&quot;3&quot;},{&quot;V&quot;:&quot;已过期&quot;,&quot;K&quot;:&quot;4&quot;}]" alias="vpa" type="select-search"></object>
    </div>
   </div>
   <div>
    <label>开始时间</label>
    <div>
     <object item_name="ACTION_BEGIN_TIME" jdbctype="DATETIME" alias="vpa" type="daterange"></object>
    </div>
   </div>
  </form>
  <div id="tableButton">
   <button opentype="PARENT" url="/bdweb/limit/toAdd" item_name="add" type="button-table">添加限购</button>
  </div>
  <table>
   <tbody>
    <tr id="column">
     <th id="rowbutton" width="" fixed="">
      <button opentype="PARENT" windowname="编辑" url="/bdweb/limit/toEdit?actionId=${ACTION_ID}" item_name="rowbtb" type="button-single" display="${EDIT}" class="layui-border-blue">编辑</button>
      <button opentype="CONFIRM_AJAX" windowname="禁用后会影响前台正在进行中的活动，是否确认禁用?" url="/bdweb/limit/disabled?actionId=${ACTION_ID}" item_name="dis" type="button-single" display="${DISABLE}" class="layui-border-orange">禁用</button>
      <button opentype="CONFIRM_AJAX" windowname="是否确认删除当前促销" url="/beweb/limit/delete/?actionId=${ACTION_ID}" item_name="del" type="button-single" display="${DELETED}" class="layui-border-red">删除</button>
     </th>
     <th item_name="ACTION_ID">编号</th>
     <th item_name="ACTION_NAME">限购名称</th>
     <th item_name="LIMIT_TYPE" body="td-select" datatype="JSON" data="[{&quot;V&quot;:&quot;限单品&quot;,&quot;K&quot;:&quot;1&quot;},{&quot;V&quot;:&quot;限分类&quot;,&quot;K&quot;:&quot;2&quot;}
,{&quot;V&quot;:&quot;限品牌&quot;,&quot;K&quot;:&quot;3&quot;}]">限购类型</th>
     <th item_name="ACTION_LINK" url="/bdweb/limit/getActivityUrl?type=1&amp;actionId=${ACTION_ID}" body="td-link" opentype="MODEL" windowname="促销商品">促销商品</th>
     <th item_name="ACTION_BEGIN_TIME" jdbctype="DATETIME">开始时间</th>
     <th item_name="ACTION_END_TIME" jdbctype="DATETIME">结束时间</th>
     <th item_name="STATE" body="td-select" datatype="JSON" data="[{&quot;V&quot;:&quot;未生效&quot;,&quot;K&quot;:&quot;1&quot;},{&quot;V&quot;:&quot;生效中&quot;,&quot;K&quot;:&quot;2&quot;}
,{&quot;V&quot;:&quot;已终止&quot;,&quot;K&quot;:&quot;3&quot;},{&quot;V&quot;:&quot;已过期&quot;,&quot;K&quot;:&quot;4&quot;}]">活动状态</th>
     <th item_name="ADD_TIME" jdbctype="DATETIME">添加时间</th>
     <th item_name="MOD_TIME" jdbctype="DATETIME">更新时间</th>
     <th item_name="PUBLISHER">发布人</th>
     <th item_name="LINK" url="/limit/getActivityList?type=1&amp;platformId=1&amp;actionId=${ACTION_ID}" body="td-link" opentype="MODEL" windowname="详情">活动统计</th>
    </tr>
   </tbody>
  </table>
  <pre id="express" orderby="ORDER BY
        vpa.ADD_TIME DESC" groupby="">

<![CDATA[ 
StringBuilder sql=new StringBuilder();
sql.append("
    SELECT
        vpa.ACTION_ID,
        vpa.ACTION_NAME,
        vpl.LIMIT_TYPE,
        vpa.ACTION_BEGIN_TIME,
        vpa.ACTION_END_TIME,
        vpa.STATE,
        vpa.ADD_TIME,
        vpa.MOD_TIME,
        vpa.PUBLISHER ,
        '活动链接' ACTION_LINK,
        case when vpa.STATE=2 or vpa.STATE=4
        then 
        '详情' else '' end 
        LINK,0 EDIT,1 DELETED,1 DISABLE
    FROM
        V_PROMOTION_ACTION AS vpa 
    LEFT JOIN
        V_PROMOTION_LIMIT AS vpl 
            ON vpl.PROMOTION_ACTION_ID = vpa.ACTION_ID 
    WHERE
        vpa.PLATFROM_ID = 1 
        AND vpa.IS_DEL = 0 
    ");
return search(sql);
]]>


  </pre>
  <pre id="count">

</pre>
  <pre item_name="displayorder_express" type="">

<![CDATA[ 

]]>


  </pre>
  <div id="append_foot"></div>
 </body>
</html>
