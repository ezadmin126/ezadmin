<html>
 <head>
  <title>SQL统计</title>
 </head>
 <body id="sqlog" datasource="ez-dataSource"   linestyle="height: 95px;">
  <div id="append_head"></div>
  <ul id="tab">
  </ul>
  <form id="search">
   <div>
    <label>应用名称</label>
    <div>
     <object item_name="APPNAME" type="input-text"></object>
    </div>
   </div>
   <div>
    <label>执行语句</label>
    <div>
     <object item_name="FULL_SQL" type="input-text"></object>
    </div>
   </div>
   <div>
    <label>添加时间</label>
    <div>
     <object item_name="ADD_TIME" jdbctype="DATETIME" type="daterange"></object>
    </div>
   </div>
   <div>
    <label>更新时间</label>
    <div>
     <object item_name="UPDATE_TIME" jdbctype="DATETIME" type="daterange"></object>
    </div>
   </div>
  </form>
  <div id="tableButton">
  </div>
  <table>
   <tbody>
    <tr id="column">
     <th id="rowbutton"></th>
     <th item_name="ID" head="th-numbers" body="firstcol-numbers" width="60" fixed="left">序号</th>
     <th item_name="APPNAME" width="60">应用名称</th>
     <th item_name="FULL_SQL">执行语句</th>
     <th item_name="ADD_TIME" order="1" jdbctype="DATETIME" width="200">添加时间</th>
     <th item_name="UPDATE_TIME" order="1" jdbctype="DATETIME" width="200">更新时间</th>
     <th item_name="EXE_COUNT" order="1" width="60">执行次数</th>
     <th item_name="EXE_TIME" order="1" width="60">执行时长</th>
    </tr>
   </tbody>
  </table>
  <pre id="express" orderby="order by ID DESC" groupby="">

<![CDATA[ 
StringBuilder sql=new StringBuilder();
sql.append("
    SELECT
        ID,
        APPNAME,
        FULL_SQL  ,
        ADD_TIME,
        UPDATE_TIME,
        EXE_COUNT,
        EXE_TIME 
    FROM
        t_sql ts 
    WHERE
        1 = 1");
return search(sql);
]]>


  </pre>
  <pre id="count">

</pre>
  <pre item_name="displayorder_express" type="">

<![CDATA[ 

]]>


  </pre>
  <div id="append_foot"></div>
 </body>
</html>
