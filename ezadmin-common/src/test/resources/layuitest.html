<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Demo</title>
    <!-- 请勿在项目正式环境中引用该 layui.css 地址 -->
    <link href="//unpkg.com/layui@2.13.4/dist/css/layui.css" rel="stylesheet">
</head>
<body class="layui-padding-3">

<form class="layui-form layui-row layui-col-space16">
    <div class="layui-col-md4">
        <div class="layui-input-wrap">
            <div class="layui-input-prefix">
                <i class="layui-icon layui-icon-username"></i>
            </div>
            <input type="text" name="A" value="" placeholder="Field A" class="layui-input" lay-affix="clear">
        </div>
    </div>
    <div class="layui-col-md4">
        <div class="layui-input-wrap">
            <input type="text" name="B" placeholder="Field B" lay-affix="clear" class="layui-input">
        </div>
    </div>
    <div class="layui-col-md4">
        <div class="layui-input-wrap">
            <div class="layui-input-prefix">
                <i class="layui-icon layui-icon-date"></i>
            </div>
            <input type="text" name="C" readonly placeholder="Field C" class="layui-input demo-table-search-date">
        </div>
    </div>
    <div class="layui-btn-container layui-col-xs12">
        <button class="layui-btn" lay-submit lay-filter="demo-table-search">Search</button>
        <button type="reset" class="layui-btn layui-btn-primary">Clear</button>
    </div>
</form>
<table class="layui-hide" id="ID-table-demo-search"></table>

<!-- 请勿在项目正式环境中引用该 layui.js 地址 -->
<script src="//unpkg.com/layui@2.13.4/dist/layui.js"></script>
<script>
    layui.use(function () {
        var table = layui.table;
        var form = layui.form;
        var laydate = layui.laydate;
        console.log(123)

        // 构建 where 参数
        var whereParams = {
            a: 'aa',
            b: 'field.B',
            c: 'field.C'
        };
        console.log('Initial where params:', whereParams);

        // 创建表格实例
        table.render({
            elem: '#ID-table-demo-search',
            url: 'https://unpkg.com/outeres@0.1.3/json/2/table/user.json', // 此处为静态模拟数据，实际使用时需换成真实接口
            cols: [[
                {type: 'radio', title: '😊', fixed: true}, // 单选框
                {field: 'id', title: 'ID', width: 80, sort: true, fixed: true},
                {field: 'username', title: '用户名', width: 80},
                {field: 'sex', title: '性别', width: 80, sort: true},
                {field: 'city', title: '城市', width: 80},
                {field: 'sign', title: '签名'},
                {field: 'experience', title: '积分', sort: true, width: 80}
            ]],
            page: true,
            height: 310,
            where: whereParams // 搜索的字段
        });

        // 日期
        laydate.render({
            elem: '.demo-table-search-date'
        });

        // 重新加载时的 where 参数
        var reloadWhereParams = {
            a: 'aa',
            b: 'field.B',
            c: 'field.C'
        };
        console.log('Reload where params:', reloadWhereParams);

        table.reload('ID-table-demo-search', {
            page: {
                curr: 1 // 重新从第 1 页开始
            },
            where: reloadWhereParams // 搜索的字段
        });
    });
</script>


</body>
</html>
