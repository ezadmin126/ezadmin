<!- 直接使用dsl里面 toolbarList  的配置 -->
<button type="button" style="margin-bottom: 0px;"
        class="  layui-btn   layui-btn-sm layui-btn-normal ez-button "
        th:text="${label}"
        th:name="${item_name}"
        th:attrs="${props}"
        th:data-click="${(props!=null and not #strings.equalsIgnoreCase(props.opentype, 'script'))?'ez-button':''}"
        th:data-propsJson="${propsJson}"
        th:item_name="${'button_'+item_name}"
        component="button-toolbar"
>
    操作
</button>
