<div th:class="'component-col col-'+${item_name}"
     th:classappend="${classAppend}" th:data-config-json="${componentJson}"
>
    <div   class="layui-form-item"  th:item_name="${item_name}"  component="cascader">
        <label class="layui-form-label" th:if="${not #strings.isEmpty(label)}">
            <span th:if="${props != null and props.required}" style="color: red;">*</span>
            <span th:utext="${label}+'：'">字段名</span>
        </label>
        <div class="layui-input-block">
            <div th:placeholder="${props != null and props.placeholder != null ?  props.placeholder : '请选择' + label}"  class="ez-laycascader layui-input"
                 th:id="${'ez-xmselect'+item_name}"
                 th:name="${item_name}"
                 th:attrs="${props}"
                 th:data-dataJson="${dataJson}"
                 th:data-propsJson="${propsJson}"
                 th:data-dataApi="${initData != null and initData.dataApi != null ?  initData.dataApi : ''}"
            ></div>
        </div>
    </div>
</div>
