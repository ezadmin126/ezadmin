<div th:class="'component-col col-'+${item_name}"
     th:classappend="${classAppend}" th:data-config-json="${componentJson}"
>
    <div class="layui-form-item" th:item_name="${item_name}" component="input">
        <label class="layui-form-label" th:if="${not #strings.isEmpty(label)}">
            <span th:if="${props != null and props.required}" style="color: red;">*</span>
            <span th:utext="${label}+'：'">字段名</span>
        </label>
        <div class="layui-input-block">
            <div class="layui-input-wrap">
                <input th:name="${item_name}" class="layui-input" th:attrs="${props}" th:data-propsJson="${propsJson}"
                       th:lay-filter="${'lay-filter-'+item_name}">
            </div>
            <div th:if="${props != null and not #strings.isEmpty(props.description)}"
                 class="layui-form-mid layui-word-aux" th:utext="${props.description}"></div>
        </div>
    </div>
</div>
