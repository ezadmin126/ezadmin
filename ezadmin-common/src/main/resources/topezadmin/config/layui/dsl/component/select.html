<div th:class="'col-'+${item_name}+' layui-col-md' + ${ col != null ? col: 12} ">

<div   class="layui-form-item"  th:item_name="${item_name}">
    <label class="layui-form-label" th:if="${not #strings.isEmpty(label)}">
        <span th:if="${props != null and props.required}" style="color: red;">*</span>
        <span th:utext="${label}+'：'">字段名</span>
    </label>
    <div class="layui-input-block" >
        <select th:name="${item_name}" lay-search  th:attrs="${props}"
                th:data-propsJson="${propsJson}"  th:lay-filter="${'lay-filter-'+item_name}">
            <option value=""  th:placeholder="${props != null and props.placeholder != null ?  props.placeholder : '请选择' + label}">请选择</option>
            <option th:each="option : ${data}"
                    th:value="${option.value}"
                    th:utext="${option.label}">选项</option>
        </select>
        <div th:if="${props != null and not #strings.isEmpty(props.description)}" class="layui-form-mid layui-word-aux" th:utext="${props.description}"></div>
    </div>
</div>
</div>
