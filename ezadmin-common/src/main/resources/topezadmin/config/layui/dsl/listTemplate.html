<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${list.title}">列表页面</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <link rel="stylesheet" th:href="${'/webjars/dragula/3.7.3/dist/dragula.min.css'}"/>
    <link th:href="${'/webjars/topezadmin/plugins/cascader/cascader.css'}" rel="stylesheet">
    <link th:href="${'/webjars/layuidist/css/layui.css?v1='+vi}" rel="stylesheet">
    <link th:href="${'/webjars/topezadmin/layui/css/ezlist.css?v='+vi}" rel="stylesheet">
    <script th:src="${'/webjars/jquery/1.12.4/jquery.min.js'}"></script>
    <script th:src="${'/webjars/topezadmin/layui/js/jquery.cookie.js'}"></script>
    <script th:src="${'/webjars/jqueryform/jquery.form.js?'}"></script>
    <script th:src="${'/webjars/jquery-validation/1.19.5/jquery.validate.min.js'}"></script>
    <script th:src="${'/webjars/jquery-validation/1.19.5/localization/messages_zh.min.js'}"></script>
    <script src="/webjars/dragula/3.7.3/dist/dragula.min.js"></script>
    <script th:src="${'/webjars/layuidist/layui.js?v1='+vi}" type="text/javascript"></script>
    <script th:src="${'/webjars/topezadmin/plugins/cascader/cascader.js'}" type="text/javascript"></script>
    <script th:src="${'/webjars/topezadmin/plugins/cascader/xm-select.js'}" type="text/javascript"></script>
    <script th:src="${'/webjars/topezadmin/layui/js/watermark.js?v1='+vi}" type="text/javascript"></script>
    <script th:src="${'/webjars/topezadmin/layui/js/Global.js?v='+vi}" type="text/javascript"></script>
    <script th:src="${'/webjars/topezadmin/layui/js/ezdsl.js?v='+vi}" type="text/javascript"></script>

</head>
<body>
<input type="hidden" id="initApi" th:value="${list.initApi}">
<input type="hidden" id="ENCRYPT_LIST_ID" th:value="${ENCRYPT_LIST_ID}">
<input type="hidden" id="downloadUrl" th:value="${downloadUrl}">
<input type="hidden" ID="EZ_SESSION_USER_NAME_KEY" name="EZ_SESSION_USER_NAME_KEY"
       th:value="${EZ_SESSION_USER_NAME_KEY}">
<input type="hidden" ID="EZ_SESSION_USER_ID_KEY" name="EZ_SESSION_USER_ID_KEY" th:value="${EZ_SESSION_USER_ID_KEY}">
<div th:utext="${col}" th:remove="tag"  th:each="col : ${tdTemplates}"></div>

<div th:utext="${list.appendHead}" item_name="appendHead" th:if="${not #strings.isEmpty(list.appendHead )}"></div>


<div  th:class="${ (#lists.isEmpty(list.search)?'':'layui-fluid')}">

    <div class="layui-layout">
        <div class="layui-side  " th:if="${not #maps.isEmpty(list.menu)}" style="top: 10px;">
            <div class="layui-side-scroll  layui-panel"  style="padding-top:10px">
                <div class="ez-search-menu" th:id="${'ez-tree-'+list.menu.item_name}"
                     th:data-dataJson="${list.menu.dataJson}"
                     th:data-propsJson="${list.menu.propsJson}"
                     th:item_name="${list.menu.item_name}"
                ></div>
            </div>
        </div>
        <div class="layui-body" th:style="${not #maps.isEmpty(list.menu)?'width: calc(100% - 200px);':'left:0px !important'}">
            <div class="layui-tab layui-tab-brief searchWrap" lay-filter="searchWrap"
                 th:style="${(#lists.isEmpty(list.search)||list.hideSearch?'display:none':'')}"
            >
                <ul class="layui-tab-title" id="tab" item_name="tabList" th:if="${not #lists.isEmpty(list.tabList)}">
                    <li th:lay-id="${item.item_name}" th:item_id="${item.item_name}"
                        th:classappend="${item.select?'layui-this  ':' '}"
                        th:each="item:${list.tabList}">
                        <a th:item_name="${item.item_name}" th:href="${item.url}" th:text="${item.label}"></a>
                    </li>
                </ul>
                <div class="layui-tab-content"  >
                    <div class="layui-tab-item layui-show">
                        <div class="layui-card"    style="padding:10px;">
                            <div class="layui-card-body">

                                <form class="layui-form"   id="searchForm" lay-filter="searchForm">
                                    <th:block th:if="${list.search != null and not #lists.isEmpty(list.search)}">
                                        <th:block th:each="rowObj : ${list.search}">
                                            <div class="  searchcontent layui-row layui-col-space5" item_name="searchcontent">
                                                <th:block th:each="search : ${rowObj.row}">
                                                    <div th:utext="${cr.render(search)}" class="selector list-item" th:remove="tag"></div>
                                                </th:block>
                                            </div>
                                        </th:block>
                                    </th:block>
                                    <div class="layui-form-item searchButtonRow"  style=" text-align: center; "  >
                                        <!-- 查询按钮 -->
                                        <div class="layui-inline">
                                            <button type="button" class="layui-btn layui-btn-normal layui-btn-sm" id="searchBtn">查询</button>
                                            <button type="button"  data-click="reset" class="layui-btn layui-btn-primary layui-btn-sm">重置</button>
                                            <button type="button"
                                                    id="downBtn"  style="display: none"
                                                    class="layui-btn layui-btn-primary layui-btn-sm   "
                                                    data-placement="top" title="展开">
                                                展开
                                                <i class="layui-icon layui-icon-down"></i>
                                            </button>
                                            <button type="button" id="upBtn" style="display: none"
                                                    class="layui-btn layui-btn-primary layui-btn-sm   "
                                                    data-placement="top" title="收起">
                                                收起
                                                <i class="layui-icon layui-icon-up"></i>
                                            </button>
                                        </div>
                                    </div>
                                    <div class="form-group col-md-3 row orderBy" STYLE="display:none">
                                        <input type="hidden" id="currentPage" name="currentPage" >
                                        <input type="hidden" id="perPageInt" name="perPageInt" th:value="${perPageInt}">
                                        <input type="hidden" id="totalPage" name="totalPage" >
                                        <input type="hidden" id="trace" name="trace" value="0">
                                        <input type="hidden" id="totalRecord" name="totalRecord" >
                                        <input id="orderByName" name="orderByName" >
                                        <input id="orderByType" name="orderByType" >
                                        <input id="customSearch" name="customSearch">
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div><!--formitem-->
                </div><!--tab-content-->
            </div><!--tab -->
            <div class="layui-card">
                <div class="layui-card-body">
                    <div id="table-wrap" item_name="table-wrap">
                        <!-- 数据表格 -->
                        <table class="layui-hide" id="dataTable" lay-filter="dataTable">
                            <thead>
                            <tr>
                                <th  th:each="column : ${list.column}" th:text="${column.label}"
                                     th:data-propsJson="${column.propsJson}"
                                >ID</th>
                            </tr>
                            </thead>
                        </table>

                        <DIV class="layui-table-column layui-table-page">
                            <div class="layui-inline layui-table-pageview" style="margin-right: 10px;
                        margin-top: 8px;"  >
                                <div id="PAGE_LAYUI">
                                </div>
                            </div>
                        </DIV>

                    </div>
                </div>

            </div>
        </div>
    </div>

</div>


<script type="text/html" id="toolbarDemo">
    <div class="layui-btn-container" item_name="tableButton">
        <th:block th:each="toolbar : ${list.tableButton}">
            <div th:utext="${cr.render(toolbar)}" th:remove="tag"></div>
        </th:block>
    </div>
</script>
<!-- 操作列模板 -->
<script type="text/html" id="toolbarTpl" th:if="${not #lists.isEmpty(list.rowButton)}" >
    <div style="display: flex" item_name="rowButton">
        <th:block th:each="action : ${list.rowButtonNormal}">
            <div th:utext="${cr.render(action)}" th:remove="tag"></div>
        </th:block>
        <div class="layui-breadcrumb" lay-separator="|"  th:if="${not #lists.isEmpty(list.rowButtonBread)}" >
            <div th:each="action : ${list.rowButtonBread}" th:utext="${cr.render(action)}" th:remove="tag"></div>
        </div>
        <div class="dropdown_button">
            <button class="layui-btn layui-btn-primary layui-btn-sm "
                    th:if="${not #lists.isEmpty(list.rowButtonDropdown)}"
            >
                更多
                <i class="layui-icon layui-icon-down layui-font-12"></i>
            </button>
            <th:block >
                <ul   class="dropdown_button_item"  th:if="${not #lists.isEmpty(list.rowButtonDropdown)}">
                    <li th:each="action : ${list.rowButtonDropdown}" th:utext="${cr.render(action)}" th:remove="tag"></li>
                </ul>
            </th:block>
        </div>
    </div>
</script>
<script th:inline="javascript">
    /*<![CDATA[*/

    layui.use(function(){
        var table = layui.table;
        var treeTable = layui.treeTable;
        var form = layui.form;
        var layer = layui.layer;
        var laydate = layui.laydate;
        var laytpl = layui.laytpl;
        var laypage = layui.laypage;
        var loadIndex=layer.load(3, {shade: [1, '#FFF']});
        const tree = layui.tree;
        try {


            /*[# th:if="${not #maps.isEmpty(list.menu)}"]*/

            var itemName = $(".ez-search-menu").attr("item_name");
            const id='ez-tree-'+itemName;
            try {
                // 模拟数据
                const data = document.getElementById(id).getAttribute("data-dataJson") || '[]';
                const props = document.getElementById(id).getAttribute("data-propsJson") || '{}';
                const config = {
                    elem: '#' + id,
                    id:id,
                    data: Global.listToTree(JSON.parse(data), 'value', 'parentId', 'children'),//value,parentId,children
                    customName: {
                        id: 'value',
                        title: 'label',
                        children: 'children'
                    },
                    onlyIconControl: true,
                    showCheckbox: true,
                    oncheck: function(obj){
                        // 合并参数：URL参数 -> 表单参数 -> menu参数（后者覆盖前者）
                        var where = mergeWhereParams();
                        layui.table.reloadData('dataTable',{
                            where: where
                        })
                    }
                };
                // 渲染
                tree.render(Global.deepUnion(config, JSON.parse(props)));
                Global.set("menu", tree);
            } catch (e) {
                console.log(e);
            }
            /*[/]*/


            laytpl.config({
                // open: '<%', // 自定义起始界定符
                // close: '%>', // 自定义起始界定符
                tagStyle: 'modern' // 采用新版本的标签风格
            });
            var cacheJsonConfig = cacheConfig();

            // 获取 URL 参数
            var urlParams = getUrlParams();

            // 设置表单默认值（从 URL 参数）
            initFormValue(getUrlParams());

            calculateSearchItemDisplay();

            // 渲染表格
            var cols = [];

            // 序号列
            /*[# th:if="${list.body.showIndex}"]*/
            cols.push({type: 'numbers', title: '序号', width: 60, fixed: 'left'});
            /*[/]*/

            // 选择列
            /*[# th:if="${list.body.selectable}"]*/
            cols.push({type: 'checkbox', fixed: 'left'});
            /*[/]*/

            // 数据列
            /*[# th:each="column : ${list.column}" ]*/
                var columnConfig = {
                    field: '[(${column.item_name})]',
                    title: '<span component="[(${column.component})]" item_name="[(${column.item_name})]">[(${column.label})]</span>'
                };

                // 添加渲染器（RenderConfig）
                /*[# th:if="${column.component != null   }"]*/
                columnConfig.templet = function (d) {
                    var valueOrigin = d['[(${column.item_name})]'] || '';
                    var column = /*[[${column}]]*/;
                    var component = /*[[${column.component}]]*/ ;
                    var name =/*[[${column.item_name}]]*/;
                    const render = Global
                        .registry("columnRender")
                        .get(component);
                    var renderValue=valueOrigin;
                    if (render) {
                        renderValue = render(name, d, column);
                    }
                    /*[# th:if="${column.props != null and  column.props.format !=null  }"]*/
                        var formatPattern = '[(${column.props.format})]';
                        if (formatPattern && valueOrigin) {
                            try{
                                renderValue = layui.util.toDateString(valueOrigin, formatPattern);
                            }catch(e){
                                console.log(e+"格式化错误"+valueOrigin+formatPattern);
                            }
                        }
                    /*[/]*/
                    return renderValue;
                };
                /*[/]*/
                // 将column.component.props里面所有的值，塞入 columnConfig
                /*[# th:if="${column.props != null}"]*/
                    /*[# th:each="entry : ${column.props.entrySet()}"]*/
                        var key = [[${entry.key}]];
                        columnConfig[key] = [[${entry.value}]];
                    /*[/]*/
                /*[/]*/
                //用户如果自己设置了宽度，以用户的为准 格式为 '{"colwidth":{"USER_NAME":232,"USER_SEX":234}}'
                var colwidth = cacheJsonConfig.colwidth;
                if (colwidth) {
                    if (colwidth[columnConfig.field]) {
                        columnConfig.width = colwidth[columnConfig.field];
                    }
                }
                cols.push(columnConfig);
            /*[/]*/

            // 操作列
            /*[# th:if="${list.rowButton != null and !list.rowButton.isEmpty()}"]*/
            var rowActionConfig = {
                title: '操作',
                field: 'rowbutton',
                fixed: 'right',
                width: /*[[${list.body.rowActionWidth}]]*/,
                toolbar: '#toolbarTpl'
            };

            if (colwidth && colwidth[rowActionConfig.field]) {
                rowActionConfig.width = colwidth[rowActionConfig.field];
            }
            cols.push(rowActionConfig);
            /*[/]*/

            // 初始化筛选状态
            var local = layui.data('table-filter-test'); // 获取对应的本地记录
            layui.each(cols, function (index, item) {
                if (item.field in local) {
                    item.hide = local[item.field];
                }
            });


            var tableConfig = {
                id: 'dataTable',
                elem: '#dataTable',
                height: 'full-' + tableHeight()  //设置高度
                , escape: false
                , autoSort: false,
                cellMinWidth:100,
                loading:false,
                toolbar: '#toolbarDemo',
                defaultToolbar: ['filter'],
                cellExpandedMode: 'tips',
                url:  document.getElementById("initApi").value,
                method:'post',
                where: function(){
                    // 合并参数：URL参数 -> 表单参数 -> menu参数（后者覆盖前者）
                    return mergeWhereParams();
                },  // 使用 URL 参数作为初始查询条件
                page: false,
                cols: [cols],
                done: function (res, curr, count, origin) {
                    $("#searchBtn").removeClass("layui-btn-disabled");
                    $("#resetBtn").removeClass("layui-btn-disabled");
                    layui.element.render('breadcrumb');
                    doRowButton();


                    var pageConfig={
                        elem: 'PAGE_LAYUI'
                        , count: count
                        , curr: document.getElementById('currentPage').value
                        , limit: document.getElementById('perPageInt').value
                        , limits: [10, 20, 30, 40, 50, 100]
                        , layout: ['count', 'prev', 'page', 'next', 'limit', 'skip']
                        , jump: function (obj, first) {
                            if (!first) {
                                document.getElementById('perPageInt').value = obj.limit;
                                document.getElementById('currentPage').value = obj.curr;
                                tableIns.reload({where: mergeWhereParams()});
                            }
                        }
                    };

                    laypage.render(pageConfig);


                    // 记录筛选状态
                    var that = this;
                    that.elem.next().on('mousedown', 'input[lay-filter="LAY_TABLE_TOOL_COLS"]+', function () {
                        var input = $(this).prev()[0];
                        // 此处表名可任意定义
                        layui.data('table-filter-test', {
                            key: input.name
                            , value: input.checked
                        })
                    });
                    initWater();

                     if(typeof initFunction === 'function'){
                          initFunction(res, curr, count, origin);
                     }
                    loadIndex && layer.close(loadIndex);

                },
                error: function(e, msg) {
                    console.log(e, msg)
                    $("#searchBtn").removeClass("layui-btn-disabled");
                    $("#resetBtn").removeClass("layui-btn-disabled");
                    loadIndex && layer.close(loadIndex);
                    layer.msg("数据加载异常"+msg);

                }
            }



            /*[# th:if="${list.hideSearch}"]*/
            tableConfig['toolbar'] =null;
            tableConfig['defaultToolbar'] =[];
            /*[/]*/



            //使用body里面的属性覆盖
            /*[# th:if="${list.body != null}"]*/
            /*[# th:each="entry : ${list.body.entrySet()}"]*/
            var key = [[${entry.key}]];
            tableConfig[key] = [[${entry.value}]];
            /*[/]*/
            /*[/]*/

            /*[# th:if="${not #maps.isEmpty(list.tree)}"]*/
                tableConfig.tree = {
                    "customName": {
                        "id": "VALUE",
                        "pid": "PARENT_ID",
                        "name": "LABEL",
                        "children": "CHILDREN",
                        "isParent": "IS_PARENT"
                    },
                    "view": {
                        "expandAllDefault": true
                    },
                    "callback": {
                        "onExpand": function (tableId, trData, expandFlag) {
                            console.log(tableId + trData + "\t" + expandFlag)
                            if (expandFlag) {
                                doRowButton();
                            }
                        }
                    },
                    "data": {
                        "isSimpleData": true
                    }
                };
                /*[# th:each="entry : ${list.tree.entrySet()}"]*/
                    var key = [[${entry.key}]];
                    tableConfig.tree[key] = [[${entry.value}]];
                /*[/]*/
                var tableIns = treeTable.render(tableConfig);
                Global.set("table",tableIns);
            /*[/]*/
            /*[# th:if="${ #maps.isEmpty(list.tree)}"]*/
            var tableIns = table.render(tableConfig);
            Global.set("table",tableIns);
            /*[/]*/


            table.on('sort(dataTable)', function (obj) {
                // $("#orderBy").attr("name", obj.field + "_ORDER");
                if (obj.field && obj.type) {
                    $("#orderByName").val(obj.field);
                    $("#orderByType").val(obj.type);
                } else {
                    $("#orderByName").val('');
                    $("#orderByType").val('');
                }
                tableIns.reload({where:  mergeWhereParams()});
            });

            table.on('colResized(dataTable)', function (obj) {
                var col = obj.col; // 获取当前列属性配置项
                var options = obj.config; // 获取当前表格基础属性配置项

                var field = obj.col.field;
                var width = obj.col.width;

                var json = cacheConfig();
                var colwidth = json.colwidth == undefined ? {} : json.colwidth;
                colwidth[field] = width;
                json.colwidth = colwidth;
                updateCacheConfig(JSON.stringify(json));
            });

            // 搜索
            $('#searchBtn').on('click', function () {
                if(!$("#searchBtn").hasClass("layui-btn-disabled")){
                    $("#searchBtn").addClass("layui-btn-disabled");
                    document.getElementById('currentPage').value = 1;
                    document.getElementById('orderByName').value = '';
                    document.getElementById('orderByType').value = '';
                    tableIns.reload({where: mergeWhereParams()});
                }
            });
            // 展开按钮：显示所有搜索条件
            $("#downBtn").click(function () {
                $(this).hide();
                $("#upBtn").show();
                $(".searchcontent").children().not(".form-item-hidden").show();
            })
            // 收起按钮：恢复到只显示前2行
            $("#upBtn").click(function () {
                $(this).hide();
                $("#downBtn").show();
                calculateSearchItemDisplay();
            })
        }catch (e){
            console.log(e);
            loadIndex && layui.layer.close(loadIndex);
        }
    });
    /*]]>*/


    function getCheckedIds() {
        var checkStatus = layui.table.checkStatus('dataTable');
        // 获取选中行数据的ID数组,逗号分隔，并去重
        var ids = checkStatus.data.map(function (row) {
            return row.ID||row.id;
        });
        return ids.join(",").split(",").filter(function (item, index, self) {
            return self.indexOf(item) === index;
        });
    }
    //处理行按钮
    function doRowButton() {
        var dropdown = layui.dropdown;
        document.querySelectorAll('.dropdown_button').forEach(function (box) {
            const btn = box.querySelector('button');
            const items = [];

            // 读取下拉列表项
            box.querySelectorAll('.dropdown_button_item li').forEach(function (a) {
                const jsonStr = a.getAttribute('data-propsjson') || '{}';
                let cfg;
                try {
                    cfg = JSON.parse(jsonStr);
                } catch (e) {
                    cfg = {};
                }
                if(!(cfg.display && cfg.display.trim()=="none")){
                    items.push({
                        title: a.innerText.trim(),
                        id: a.getAttribute('name'),
                        opentype: cfg.opentype,
                        url:cfg.url,
                        windowname: cfg.windowname
                    });
                }
            });

            // 如果有可用项，初始化 dropdown
            if (items.length > 0) {
                box.style.display = 'block';
                dropdown.render({
                    elem: btn,
                    data: items,
                    click: function (cfg) {
                        // if (cfg.area == undefined) {
                        //     ezopen(cfg.opentype, cfg.windowname, cfg.url);
                        // } else {
                        ezopen(cfg.opentype, cfg.windowname, cfg.url, cfg.area);
                        //    }
                    }
                });
            }else{
                box.style.display = 'none';
            }
        });

        document.querySelectorAll('.layui-breadcrumb').forEach(function (box) {
            const links = box.querySelectorAll('a[component="button-bread"]');

            let allHidden = true;

            links.forEach(a => {
                // 检查 style 中是否隐藏
                const styleDisplay = a.style.display?.trim();

                // 检查 data-json 中的 display
                let jsonDisplay = null;
                const jsonStr = a.getAttribute('data-propsJson');
                if (jsonStr) {
                    try {
                        const cfg = JSON.parse(jsonStr);
                        jsonDisplay = cfg.display?.trim();
                    } catch (e) {}
                }

                // 如果有任意一个是显示状态，则标记为 false
                if (styleDisplay !== 'none' && jsonDisplay !== 'none') {
                    allHidden = false;
                }
            });

            // 全部隐藏 → 隐藏整个容器
            box.style.display = allHidden ? 'none' : 'flex';
        });
    }
    //解析树形标签
    function resolveTreeLabels(rawIds, treeData) {
        var idMap = {};
        treeData.forEach(x => idMap[x.id] = x);
        function path(id) {
            var arr = [];
            var cur = idMap[id];
            while (cur) {
                arr.unshift(cur.name);
                cur = idMap[cur.parent_id];
            }
            return arr.join(" / ");
        }

        return (rawIds+'').split(',').map(id => path(id));
    }
    //获取缓存配置
    function cacheConfig() {
        var key = 'EZ_CONFIG_NEW' + $("#ENCRYPT_LIST_ID").val();
        var jsonconfig = localStorage.getItem(key);
        if (jsonconfig != undefined) {
            var json = JSON.parse(jsonconfig);
            return json;
        }
        return {};
    }
    //更新缓存配置
    function updateCacheConfig(value) {
        var key = 'EZ_CONFIG_NEW' + $("#ENCRYPT_LIST_ID").val();
        localStorage.setItem(key, value);
    }
    //计算表格高度
    function tableHeight(){
        var hh = 43 + 5; //分页+padding

        if ($(".ez-table-tool:visible").length > 0) { //表头
            hh = hh + 51;
        }
        if ($(".ez-table-tool-height:visible").length > 0) { //表头
            hh = hh + 42;
        }
        if ($(".searchWrap:visible").length > 0) { //搜索
            hh = hh + $(".searchWrap").height() + 5;
        }else{
            hh=hh-5;
        }
        if ($(".appendhead").length > 0) { //搜索
            hh = hh + $(".appendhead").height();
        }
        return hh;
    }
    //合并参数：URL参数 -> 表单参数 -> menu参数（后者覆盖前者）
    function mergeWhereParams() {
        var where = {};

        // 1. 先获取URL参数作为基础
        var urlParams = getUrlParams();
        for (var key in urlParams) {
            where[key] = urlParams[key];
        }

        // 2. 用表单参数覆盖同名的URL参数
        var formParams = layui.form.val('searchForm');
        for (var key in formParams) {
            where[key] = formParams[key];
        }

        // 3. 用menu参数覆盖同名的前面参数
        /*[# th:if="${not #maps.isEmpty(list.menu)}"]*/
        try {
            var menuId = $(".ez-search-menu").attr("id");
            var itemName = $(".ez-search-menu").attr("item_name");
            if (menuId && itemName) {
                var checked = Global.getAllValues(layui.tree.getChecked(menuId));
                where[itemName] = checked.join(",");
            }
        } catch (e) {
            console.log(e);
        }
        /*[/]*/
        //如果组件是 uniondate 则需要组装customSearch参数
        // 数据结构: {"g":[{"t":"AND","c":[{"s":[{"f":"field","o":"BETWEEN","t":"OR","v":"value"}]}]}]}
        var customSearch={};
        customSearch.g=[];
        $('[component="uniondate"], [component="unioninput"]').each(function(){
                var item_name=$(this).attr("item_name");
                var component=$(this).attr("component");
                var select=$(this).find("select[item_name="+item_name+"]");
                var input=$(this).find("input[item_name="+item_name+"]");

                // 如果输入框为空，跳过
                var inputValue = input.val();
                if(inputValue == '' || inputValue == null){
                    return;
                }
                // 创建分组对象 (CustomSearchGroup)
                var customSearchGroup = {};
                customSearchGroup.t = "AND";
                customSearchGroup.c = [];

                // 创建子条件对象 (CustomSearchDTO)
                var childSearchDTO = {};
                childSearchDTO.s = [];

                // 判断select是否有选中值
                if(select.val() == ""){
                    // select没有选中，遍历所有option（除了第一个"请选择"）生成OR连接的条件
                    var firstItem = true;
                    select.find("option").each(function(){
                        var optionValue = $(this).attr("value");
                        var operator = $(this).attr("operator");
                        // 跳过空值（"请选择"选项）
                        if(optionValue == "" || optionValue == undefined){
                            return;
                        }
                        var singleCondition = {};
                        singleCondition.f = optionValue;
                        singleCondition.o = component=="uniondate" ? "BETWEEN" : (operator ? operator : "LIKE");
                        singleCondition.t = firstItem ? "AND" : "OR";  // 第一个用AND，后续用OR
                        singleCondition.v = inputValue;
                        childSearchDTO.s.push(singleCondition);
                        firstItem = false;
                    });
                } else {
                    // select有选中值，只生成单个字段的查询条件
                    var singleCondition = {};
                    singleCondition.f = select.val();
                    var operator=select.find("option:selected").attr("operator");
                    singleCondition.o = component=="uniondate" ? "BETWEEN" : (operator ? operator : "LIKE");
                    singleCondition.t = "AND";
                    singleCondition.v = inputValue;
                    childSearchDTO.s.push(singleCondition);
                }

                // 只有当有条件时才添加到分组
                if(childSearchDTO.s.length > 0){
                    customSearchGroup.c.push(childSearchDTO);
                    customSearch.g.push(customSearchGroup);
                }
        })
        where.customSearch=JSON.stringify(customSearch);
        return where;
    }
    //计算搜索栏是否隐藏
    function calculateSearchItemDisplay() {
        var $items = $(".searchcontent").children().not(".form-item-hidden");

        if ($items.length === 0) {
            $("#downBtn").hide();
            $("#upBtn").hide();
            return;
        }

        // 收集所有元素的位置信息
        var itemsInfo = [];
        $items.each(function(index) {
            var $this = $(this);
            var offset = $this.offset();
            if (offset && offset.top > 0) {  // 确保 offset 有效
                itemsInfo.push({
                    element: $this,
                    top: offset.top,
                    index: index
                });
            }
        });

        if (itemsInfo.length === 0) {
            $("#downBtn").hide();
            $("#upBtn").hide();
            return;
        }

        // 按 top 排序，并分组到行
        itemsInfo.sort(function(a, b) { return a.top - b.top; });

        var rows = [];
        var currentRow = [];
        var lastTop = itemsInfo[0].top;
        var rowThreshold = 10; // 10px 的容差，同一行内元素的 top 差异应该在这个范围内

        itemsInfo.forEach(function(item) {
            if (Math.abs(item.top - lastTop) <= rowThreshold) {
                // 同一行
                currentRow.push(item);
            } else {
                // 新的一行
                rows.push(currentRow);
                currentRow = [item];
                lastTop = item.top;
            }
        });

        // 别忘了最后一行
        if (currentRow.length > 0) {
            rows.push(currentRow);
        }

        // 判断是否需要展开/收起按钮
        if (rows.length <= 2) {
            // 总共不超过2行，不需要展开/收起功能
            $("#downBtn").hide();
            $("#upBtn").hide();
            $items.show();
        } else {
            // 超过2行，初始状态显示前2行，隐藏其余
            $("#downBtn").show();
            $("#upBtn").hide();

            // 显示前2行
            for (var i = 0; i < 2 && i < rows.length; i++) {
                rows[i].forEach(function(item) {
                    item.element.show();
                });
            }

            // 隐藏第3行及以后
            for (var i = 2; i < rows.length; i++) {
                rows[i].forEach(function(item) {
                    item.element.hide();
                });
            }
        }
    }


</script>
