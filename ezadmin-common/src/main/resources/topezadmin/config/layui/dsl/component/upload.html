<div th:class="'col-'+${item_name}+' layui-col-md' + ${ col != null ? col: 12} ">
<div   class="layui-form-item">
    <label class="layui-form-label" th:if="${not #strings.isEmpty(label)}">
        <span th:if="${props != null and props.required}" style="color: red;">*</span>
        <span th:utext="${label}+'：'">字段名</span>
    </label>
    <div class="layui-input-block"  th:item_name="${item_name}">
        <button type="button"
                class="layui-btn ez-upload layui-btn-normal"
                th:data-propsJson="${propsJson}"
            >上传</button>
        <div    class="layui-upload-list dragula-container2"
             th:id="${'layui-upload-list_'+item_name}"
        >
        </div>
        <input type="hidden"  class="ez-upload-input "  th:data-propsJson="${propsJson}"
               th:name="${item_name}" th:id="${'ITEM_ID_' + item_name}">
        <div th:if="${props != null and not #strings.isEmpty(props.description)}" class="layui-form-mid layui-word-aux" th:utext="${props.description}"></div>
    </div>
</div>
</div>
