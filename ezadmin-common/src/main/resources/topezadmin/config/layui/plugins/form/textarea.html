<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>多行文本</title>
</head>
<body id="textarea" type="form" icon="layui-icon-form">
<div id="template">
    <div class="layui-col-space10 selector layui-col-md12" ez-type="textarea">
        <div class="layui-form-item ">
            <label class="layui-form-label  ">多行文本</label>
            <div class="layui-input-block">
                <textarea name="default" class="layui-textarea"></textarea>
            </div>
        </div>
    </div>
</div>


<div id="content">
    <div class="layui-col-space10 selector" th:classappend="${'layui-col-md'+col}" ez-type="textarea"
         th:ez-label="${label}"
         th:ez-item_name="${item_name}"
         th:ez-placeholder="${placeholder}"
         th:ez-alias="${alias}"
         th:ez-col="${col}"
         th:ez-maxlength="${maxlength}"
         th:ez-item_desc="${item_desc}"
         th:ez-top_desc="${top_desc}"
         th:ez-jdbctype="${jdbctype}"
         th:ez-lay_verify="${#strings.isEmpty(lay_verify)?'':lay_verify}"
         th:ez-valid_rule="${valid_rule}"
         th:ez-valid_msg="${valid_msg}"
         th:ez-style="${style}"
         th:ez-help="${help}"
         th:ez-class="${class}"

         th:ez-readonly="${readonly}"
         th:ez-disabled="${disabled}"
         th:ez-attrMap="${attrMap}"
    >
        <div class="layui-form-item ">
            <label class="layui-form-label  " th:if="${not #strings.isEmpty(label)}">
                <span class="layui-font-red" th:if="${not #strings.isEmpty(redRequired)}">*</span>
                <i th:if="${not #strings.isEmpty(help)}"
                   th:id="${'ez-help-'+item_name}"
                   class="ez-help layui-icon-help layui-icon"
                   th:src="${help}"></i>
                [[${#strings.isEmpty(label)?'':label+'：' }]]
            </label>
            <div th:class="${#strings.isEmpty(label)?'':'layui-input-block'}">
                <small
                        class="layui-form-mid layui-text-em top_desc"
                        th:utext="${top_desc}" style="float:none"
                        th:if="${not #strings.isEmpty(top_desc)}">辅助文字(上)</small>
                <div class="layui-input-wrap" th:if="${not #strings.isEmpty(serverDom)}">
                    [(${serverDom})]
                    <span style="
    position: relative;
    float: right;
    top: -31px;
    right: 1px;
    height: 0;
"><span style="
    border-right: 0 none;
    border-radius: 15px 0 17px;
    margin-right: 1px;
" class="layui-badge layui-badge-rim"><span class="layext-textool-length" style="display: inline-block;">
                    <b class="layext-textool-count" title="当前字数" th:text="${#strings.length(value)}">0</b>/<span
                            class="layext-textool-max" title="最大字数">[[${maxlength}]]</span></span></span></span>
                </div>

                <small
                        class="layui-form-mid layui-text-em item_desc"
                        th:utext="${item_desc}"
                        th:if="${not #strings.isEmpty(item_desc)}">辅助文字(下)</small>
            </div>
        </div>
    </div>

</div>


</body>

</html>
