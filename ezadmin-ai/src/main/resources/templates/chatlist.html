<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            background-color: #f5f5f5;
        }

        /* 左侧 iframe 区域 */
        .iframe-container {
            flex: 3;
            height: 100vh;
            background-color: white;
            border-right: 1px solid #ddd;
            position: relative;
        }

        .iframe-container iframe {
            width: 100%;
            height: calc(100% - 60px);
            border: none;
        }

        .iframe-header {
            height: 60px;
            background-color: #1e88e5;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 18px;
            font-weight: bold;
        }

        /* 右侧聊天区域 */
        .chat-container {
            flex: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: white;
        }

        .chat-header {
            height: 60px;
            background-color: #00897b;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #f9f9f9;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 8px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .user-message {
            background-color: #1e88e5;
            color: white;
            margin-left: auto;
            text-align: right;
        }

        .ai-message {
            background-color: #e0e0e0;
            color: #333;
        }

        .chat-input {
            padding: 15px;
            background-color: white;
            border-top: 1px solid #ddd;
        }

        .chat-input textarea {
            width: 100%;
            height: 80px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            resize: none;
            font-family: inherit;
        }

        .chat-input button {
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #00897b;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            float: right;
        }

        .chat-input button:hover {
            background-color: #00695c;
        }

        .header-btn {
            background-color: #ff9800;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            margin-left: 10px;
        }

        .header-btn:hover {
            background-color: #f57c00;
        }

        .preview-btn {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            margin-left: 10px;
        }

        .preview-btn:hover {
            background-color: #388e3c;
        }

        .publish-btn {
            background-color: #2196f3;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            margin-left: 10px;
        }

        .publish-btn:hover {
            background-color: #1976d2;
        }

        .status {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }

        .success {
            color: #4caf50;
        }

        .error {
            color: #f44336;
        }
        
        .tool-call {
            background-color: #fff3e0;
            border-left: 3px solid #ff9800;
            padding: 10px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 12px;
        }
        
        .thinking {
            background-color: #e3f2fd;
            border-left: 3px solid #2196f3;
            padding: 10px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 12px;
        }
        
        .confirmation {
            background-color: #f1f8e9;
            border-left: 3px solid #8bc34a;
            padding: 10px;
            margin: 10px 0;
        }
        
        .confirm-btn {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            margin: 5px;
        }
        
        .cancel-btn {
            background-color: #f44336;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            margin: 5px;
        }
        
        .no-code-message {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100% - 60px);
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 16px;
        }
    </style>
</head>
<body>
<input type="hidden" id="code" th:value="${code}">
    <!-- 左侧 iframe 区域 -->
    <div class="iframe-container">
        <div class="iframe-header">
           列表预览
        </div>
        <div id="noCodeMessage" class="no-code-message" style="display: none;">
            欢迎使用  AI 助手！<br>
            您可以在右侧聊天框中创建新的列表配置。<br>
            例如：创建一个用户管理列表，包含用户名、邮箱、角色字段，支持按用户名搜索
        </div>
        <iframe id="previewFrame" style="display: none;"></iframe>
    </div>

    <!-- 右侧聊天区域 -->
    <div class="chat-container">
        <div class="chat-header">
             AI 助手
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message ai-message">
                欢迎使用  AI 助手！<br>
                我可以帮助您创建和管理列表。<br>
                请描述您需要创建的列表，例如：<br>
                "创建一个用户管理列表，包含用户名、邮箱、角色字段，支持按用户名搜索"
            </div>
        </div>
        <div class="chat-input">
            <textarea id="messageInput" placeholder="请输入您的需求..."></textarea>
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        // 页面加载完成后初始化
        window.addEventListener('load', function() {
            const code = document.getElementById('code').value;
            const iframe = document.getElementById('previewFrame');
            const noCodeMessage = document.getElementById('noCodeMessage');
            
            if (!code) {
                // 如果code为空，隐藏iframe，显示提示信息
                iframe.style.display = 'none';
                noCodeMessage.style.display = 'flex';
            } else {
                // 如果code不为空，隐藏提示信息，显示iframe
                noCodeMessage.style.display = 'none';
                iframe.style.display = 'block';
                iframe.src = '/topezadmin/list/list-' + code;
            }
        });
        
        // 发送消息到后端
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // 显示用户消息
            addMessage(message, 'user');
            input.value = '';
            
            // 显示状态消息
            const statusElement = addStatusMessage('正在处理中...');
            
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: message, code: document.getElementById('code').value })
                });
                
                const data = await response.json();
                
                // 更新状态
                updateStatusMessage(statusElement, data.success ? 'success' : 'error', 
                    data.success ? '处理完成' : '处理失败: ' + data.error);
                
                if (data.success) {
                    // 显示AI响应
                    try{
                    addMessage(JSON.parse(data.aiResponse).message, 'ai');
                    
                    // 检查AI响应中的特定文本，控制iframe行为
                    checkAndHandleResponse(data.aiResponse);
                    }catch (EEE){
                        console.log(EEE);
                        addMessage( data.aiResponse , 'ai');
                    }
                } else {
                    addMessage('处理失败: ' + data.error, 'ai');
                }
            } catch (error) {
                updateStatusMessage(statusElement, 'error', '网络错误: ' + error.message);
                addMessage('网络错误: ' + error.message, 'ai');
            }
        }
        // 检查AI响应并处理iframe行为
        function checkAndHandleResponse(aiResponse) {
            console.log(" ，控制iframe行为"+JSON.stringify(aiResponse))
            const codeInput = document.getElementById('code');
            const iframe = document.getElementById('previewFrame');
            const noCodeMessage = document.getElementById('noCodeMessage');
            
            try {
                // 尝试解析JSON响应
                var responseJson = JSON.parse(aiResponse);
                console.log("正在请求控制iframe行为2"+JSON.stringify(responseJson))
                // 检查是否包含更新成功的文本
                if (responseJson.success && responseJson.operateType=='edit') {
                    // 刷新iframe
                    refreshIframe();
                }
                
                // 检查是否包含新增成功的文本
                if (responseJson.success && responseJson.operateType=='add') {
                    // 更新code值
                    codeInput.value = responseJson.listCode;
                    // 隐藏提示信息，显示iframe
                    noCodeMessage.style.display = 'none';
                    iframe.style.display = 'block';
                    // 设置iframe的src
                    iframe.src = '/topezadmin/list/list-' + responseJson.listCode;
                }
            } catch (e) {
              console.log(e)
            }
        }
        
        // 添加消息到聊天区域
        function addMessage(content, sender) {
            const messagesContainer = document.getElementById('chatMessages');
            
            // 检查是否为工具调用消息
            if (content.startsWith('\u1F4AD')) {
                const toolCallElement = document.createElement('div');
                toolCallElement.className = 'tool-call';
                toolCallElement.textContent = content;
                messagesContainer.appendChild(toolCallElement);
            } else {
                const messageElement = document.createElement('div');
                messageElement.className = `message ${sender}-message`;
                messageElement.textContent = content;
                messagesContainer.appendChild(messageElement);
            }
            
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        // 添加状态消息
        function addStatusMessage(text) {
            const messagesContainer = document.getElementById('chatMessages');
            const statusElement = document.createElement('div');
            statusElement.className = 'status';
            statusElement.textContent = text;
            messagesContainer.appendChild(statusElement);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            return statusElement;
        }
        
        // 更新状态消息
        function updateStatusMessage(element, type, text) {
            element.textContent = text;
            element.className = 'status ' + type;
        }
        
        // 刷新 iframe
        function refreshIframe() {
            const iframe = document.getElementById('previewFrame');
            if (iframe.style.display !== 'none' && iframe.src) {
                iframe.src = iframe.src;
            }
        }
        

        // 回车发送消息（Shift+Enter换行）
        document.getElementById('messageInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
